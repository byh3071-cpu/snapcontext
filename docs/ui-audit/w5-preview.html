<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#16181a;display:flex;justify-content:center;padding:30px;font-family:system-ui,'Malgun Gothic',sans-serif}
  .wrap{width:340px}
  svg{display:block}
  .theme{--appbg:#0b0b0c;--card:#0e0e10;--card2:#08080a;--tx:#e6e3d8;--mut:#7d7a6e;--acc:#4fd6e0;--on:#04222a;--bd:#23231d;--bd2:#3a3a30;--r:6px;--bw:1px;--fhead:inherit;--shadow:none;--blur:0px}
  .theme{background:var(--appbg);border:1px solid var(--bd2);border-radius:var(--r);padding:14px;display:grid;gap:12px;color:var(--tx);font-size:14px;line-height:1.45}
  .theme .head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:var(--bw) solid var(--bd);padding-bottom:10px}
  .theme .head h1{margin:0;font-size:17px;font-weight:650;font-family:var(--fhead)}
  .theme .ver{font-size:11px;color:var(--mut)}
  .theme .card{position:relative;background:var(--card);border:var(--bw) solid var(--bd);border-radius:var(--r);padding:12px;display:grid;gap:10px;box-shadow:var(--shadow);backdrop-filter:blur(var(--blur))}
  .theme .eyebrow{font-size:10px;letter-spacing:.14em;color:var(--mut);display:flex;align-items:center;gap:6px}
  .theme .eyebrow::before{content:'';width:10px;height:1px;background:var(--acc)}
  .theme .title{margin:0;font-size:14px;font-weight:650;font-family:var(--fhead)}
  .theme .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .theme .tbtn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 8px;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:var(--card2);color:var(--tx);font:inherit;font-size:13px;font-weight:550;cursor:pointer}
  .theme .tbtn svg{color:var(--acc)} .theme .tbtn:hover{border-color:var(--acc)}
  .theme .tbtn.pri{background:var(--acc);color:var(--on);border-color:var(--acc);font-weight:650} .theme .tbtn.pri svg{color:var(--on)}
  .theme .field{width:100%;background:var(--card2);border:var(--bw) solid var(--bd2);border-radius:var(--r);color:var(--tx);font:inherit;font-size:13px;padding:8px 10px}
  .theme .field::placeholder{color:var(--mut)}
  .theme .pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .theme .btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:var(--card2);color:var(--tx);font:inherit;font-size:13px;cursor:pointer}
  .theme .btn svg{color:var(--acc)} .theme .btn.pri{background:var(--acc);color:var(--on);border-color:var(--acc);font-weight:650} .theme .btn.pri svg{color:var(--on)}
  .theme .chip{font-size:10px;color:var(--acc);border:var(--bw) solid var(--bd2);border-radius:var(--r);padding:2px 7px;justify-self:start}
  .theme .row{display:grid;grid-template-columns:46px 1fr auto;gap:10px;align-items:center;padding:8px;border:var(--bw) solid var(--bd);border-radius:var(--r);background:var(--card2)}
  .theme .thumb{width:46px;aspect-ratio:4/3;border:var(--bw) solid var(--bd2);background:rgba(128,128,128,.12);border-radius:calc(var(--r) - 1px)}
  .theme .row .body{min-width:0;display:grid;gap:2px}
  .theme .row .body b{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .theme .meta{font-size:10.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .theme .icobtn{width:28px;height:28px;display:grid;place-items:center;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:transparent;color:var(--mut);cursor:pointer}
  .theme .toast{display:flex;align-items:center;gap:8px;padding:9px 11px;border:var(--bw) solid var(--bd2);border-left:2px solid var(--acc);border-radius:var(--r);background:var(--card);font-size:13px}
  .theme .tk{font-size:9px;letter-spacing:.1em;color:var(--mut)}

  /* ===== W5 만년필 잉크 ===== */
.w5{
  /* 만년필 잉크: 차분한 미드나잇 종이 위 딥블루 잉크 — 정제된 와이어프레임 */
  --appbg:
    repeating-linear-gradient(0deg, rgba(120,150,210,.020) 0 1px, transparent 1px 28px),
    radial-gradient(130% 95% at 18% -6%, #1a2230 0%, #141a26 50%, #10141d 100%);
  --card:#171e2a;
  --card2:#121925;
  --tx:#eef1f6;             /* 또렷한 본문 — 고가독 유지 */
  --mut:#94a3bd;            /* 차분한 잉크그레이 보조 */
  --acc:#3f6fd1;            /* 딥블루 잉크 마커 */
  --on:#f4f7fd;            /* 잉크 채움 위 종이빛 텍스트 */
  --bd:#2a3850;             /* 가는 펜 헤어라인 */
  --bd2:#41557a;            /* 잉크 보더 */
  --r:9px;
  --bw:1px;                 /* 더 가는 보더 — 만년필 닙 */
  --fhead:"Segoe Print","Bradley Hand",ui-rounded,system-ui,sans-serif; /* 손글씨 톤(한글은 시스템 폴백) */
  --shadow:none;
  --blur:0px;

  position:relative;
  background:var(--appbg);
  color:var(--tx);
  letter-spacing:.1px;
}

/* (규칙1) 카드 = 펜으로 단정히 친 박스: 절제된 비대칭 라디우스 + 가는 잉크 오프셋 */
.w5 .card{
  position:relative;
  background:
    linear-gradient(180deg, rgba(63,111,209,.04), transparent 40%),
    var(--card);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r) calc(var(--r) + 3px) var(--r) calc(var(--r) + 2px); /* 손맛 절제 — 거의 정돈 */
  box-shadow:2px 2px 0 0 rgba(63,111,209,.16); /* 두 번 그은 듯 가는 잉크 오프셋 */
}
.w5 .card::before{   /* 좌상단 코너에 살짝 겹친 잉크 자국 — 절제 */
  content:"";
  position:absolute; inset:-2px auto auto -2px;
  width:15px; height:15px;
  border-top:var(--bw) solid var(--bd2);
  border-left:var(--bw) solid var(--bd2);
  border-radius:var(--r) 0 0 0;
  transform:rotate(-1deg);
  opacity:.45;
  pointer-events:none;
}

/* (규칙2) 헤더: 워드마크 밑줄을 만년필로 그은 잉크 라인 + 버전은 잉크 라벨 */
.w5 .head h1{
  font-family:var(--fhead);
  color:var(--tx);
  display:inline-block;
  padding-bottom:2px;
  background:linear-gradient(var(--acc),var(--acc)) left bottom / 100% 2px no-repeat;
  border-radius:1px;
}
.w5 .ver{
  font-family:var(--fhead);
  color:var(--on);
  background:var(--acc);
  border:var(--bw) solid var(--bd2);
  border-radius:7px 3px 7px 4px;
  padding:1px 8px;
  transform:rotate(.8deg);
  box-shadow:1px 1px 0 0 rgba(20,40,80,.4);
}

/* eyebrow: ::before 틱을 펜으로 톡 친 사선, 라벨은 살짝만 기울임 */
.w5 .eyebrow{
  font-family:var(--fhead);
  color:var(--mut);
  text-transform:uppercase;
  letter-spacing:1px;
  transform:rotate(-.3deg);
  transform-origin:left center;
}
.w5 .eyebrow::before{
  background:var(--acc);
  width:13px; height:2px;
  border-radius:2px;
  transform:skewX(-20deg);   /* 펜으로 그은 사선 틱 */
  box-shadow:3px 0 0 -1px var(--acc); /* 두 번 톡 친 잉크점 */
}

.w5 .title{ font-family:var(--fhead); color:var(--tx); }

/* 도구 버튼: 정제된 와이어프레임 박스(가는 점선 헤어라인) */
.w5 .tbtn{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) dashed var(--bd2);
  border-radius:8px 9px 7px 10px;
  box-shadow:1px 1px 0 0 rgba(20,40,80,.32);
  transition:transform .07s ease, box-shadow .07s ease;
}
.w5 .tbtn:hover{ transform:translate(-1px,-1px); box-shadow:2px 2px 0 0 rgba(20,40,80,.4); border-color:var(--acc); }
.w5 .tbtn:active{ transform:translate(1px,1px); box-shadow:0 0 0 0 rgba(20,40,80,.3); }
.w5 .tbtn.pri{
  background:linear-gradient(170deg,#5181e0 0%,#3f6fd1 60%,#3360bf 100%);
  color:var(--on);
  border:var(--bw) solid var(--bd2);
  border-style:solid;
  box-shadow:2px 2px 0 0 rgba(20,40,80,.38);
}

/* 인풋: 만년필로 그은 밑줄 필드 — 채울 곳을 비워둔 와이어프레임 */
.w5 .field{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid transparent;
  border-bottom:var(--bw) dashed var(--bd2);
  border-radius:7px 7px 2px 2px;
}
.w5 .field::placeholder{ color:var(--mut); font-style:italic; }
.w5 .field:focus{
  outline:none;
  border-color:var(--acc);
  border-bottom-style:solid;
  box-shadow:1px 1px 0 0 rgba(63,111,209,.25);
}

/* pair 버튼: 펜으로 박스 친 액션, pri는 잉크 채움 */
.w5 .btn{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:9px 6px 10px 7px;
  box-shadow:2px 2px 0 0 rgba(20,40,80,.34);
  transition:transform .07s ease, box-shadow .07s ease;
}
.w5 .btn:hover{ transform:translate(-1px,-1px); box-shadow:3px 3px 0 0 rgba(20,40,80,.4); }
.w5 .btn:active{ transform:translate(1px,1px); box-shadow:0 0 0 0 rgba(20,40,80,.3); }
.w5 .btn.pri{
  background:linear-gradient(170deg,#5181e0 0%,#3f6fd1 60%,#3360bf 100%);
  color:var(--on);
  border-color:var(--bd2);
}

/* chip: 펜으로 동그라미 친 주석 — 절제 */
.w5 .chip{
  background:transparent;
  color:var(--acc);
  border:var(--bw) solid var(--bd2);
  border-radius:999px 999px 990px 999px;
  transform:rotate(-.4deg);
}

/* row: 펜으로 끼운 스케치 카드 — 썸네일은 빈 placeholder 대각선 */
.w5 .row{
  background:var(--card2);
  border:var(--bw) dashed var(--bd);
  border-radius:9px 10px 8px 10px;
}
.w5 .thumb{
  background:
    linear-gradient(45deg, transparent calc(50% - 1px), var(--bd2) calc(50% - 1px), var(--bd2) calc(50% + 1px), transparent calc(50% + 1px)),
    linear-gradient(-45deg, transparent calc(50% - 1px), var(--bd2) calc(50% - 1px), var(--bd2) calc(50% + 1px), transparent calc(50% + 1px)),
    var(--card);
  border:var(--bw) solid var(--bd2);
  border-radius:7px 6px 8px 7px;
}
.w5 .row .body b{ font-family:var(--fhead); color:var(--tx); }
.w5 .meta{ color:var(--mut); }
.w5 .icobtn{
  background:transparent;
  color:var(--mut);
  border:var(--bw) solid var(--bd);
  border-radius:7px 5px 8px 6px;
}
.w5 .icobtn:hover{ color:var(--acc); border-color:var(--acc); transform:rotate(-2deg); }

/* toast: 잉크로 적은 메모 톤 — 가는 오프셋, 절제된 기울임 */
.w5 .toast{
  font-family:var(--fhead);
  background:var(--card);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-left:2px solid var(--acc);
  border-radius:8px 4px 8px 4px;
  box-shadow:2px 2px 0 0 rgba(20,40,80,.34);
  transform:rotate(-.5deg);
}
.w5 .toast::before{ content:"\2712  "; color:var(--acc); }
.w5 .tk{ font-family:var(--fhead); color:var(--acc); }
</style></head>
<body>
<div class="wrap">
  <div class="theme w5">
    <header class="head"><h1>SnapContext</h1><span class="ver">v0.1.3</span></header>
    <div class="toast"><span class="tk">INFO</span>캡처를 불러왔습니다.</div>
    <div class="card">
      <div class="eyebrow">캡처 모드</div>
      <div class="tools">
        <button class="tbtn pri">화면 캡처</button>
        <button class="tbtn">문서 캡처</button>
        <button class="tbtn">요소 캡처</button>
        <button class="tbtn">전체 캡처</button>
      </div>
    </div>
    <div class="card">
      <div class="eyebrow">AI 디버그 팩</div>
      <h2 class="title">컨텍스트 팩</h2>
      <textarea class="field" rows="2" placeholder="증상을 적어주세요"></textarea>
      <div class="pair">
        <button class="btn pri">프롬프트 복사</button>
        <button class="btn">JSON 복사</button>
      </div>
      <span class="chip">최근 팩 · 2</span>
    </div>
    <div class="card">
      <div class="eyebrow">캡처 기록</div>
      <div class="row"><div class="thumb"></div><div class="body"><b>예시 페이지 제목 — 길면 말줄임</b><span class="meta">06.04 14:32 · 영역 · 핀 3</span></div><button class="icobtn">x</button></div>
    </div>
  </div>
</div>
</body></html>
