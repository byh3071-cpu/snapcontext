<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>SnapContext — 프리미엄 와이어프레임 6종</title>
<style>

  *{box-sizing:border-box}
  body{margin:0;background:#0a0a0c;color:#e6e3d8;font-family:system-ui,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;padding:0 0 80px}
  .top{position:sticky;top:0;z-index:9;background:#060608;border-bottom:1px solid #23231d;padding:14px 22px}
  .top h1{margin:0 0 4px;font-size:16px}
  .top p{margin:0;font-size:12px;color:#8b8b80;line-height:1.5}
  .gal{display:flex;flex-wrap:wrap;gap:22px;padding:24px 22px;align-items:flex-start}
  .board{width:336px}
  .board > .cap{display:flex;align-items:baseline;gap:8px;margin:0 0 8px}
  .board > .cap b{font-size:14px} .board > .cap span{font-size:11px;color:#8b8b80}
  .board.keep > .cap b::after{content:' · 킵';color:#cdf03a}
  svg{display:block}

  /* ===== 구조(테마 무관) ===== */
  .theme{--appbg:#0b0b0c;--card:#0e0e10;--card2:#08080a;--tx:#e6e3d8;--mut:#7d7a6e;--acc:#4fd6e0;--on:#04222a;--bd:#23231d;--bd2:#3a3a30;--r:6px;--bw:1px;--fhead:inherit;--shadow:none;--blur:0px}
  .theme{background:var(--appbg);border:1px solid var(--bd2);border-radius:var(--r);padding:14px;display:grid;gap:12px;color:var(--tx);font-size:14px;line-height:1.45}
  .theme .head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:var(--bw) solid var(--bd);padding-bottom:10px}
  .theme .head h1{margin:0;font-size:17px;font-weight:650;font-family:var(--fhead)}
  .theme .ver{font-size:11px;color:var(--mut)}
  .theme .card{position:relative;background:var(--card);border:var(--bw) solid var(--bd);border-radius:var(--r);padding:12px;display:grid;gap:10px;box-shadow:var(--shadow);backdrop-filter:blur(var(--blur))}
  .theme .eyebrow{font-size:10px;letter-spacing:.14em;color:var(--mut);display:flex;align-items:center;gap:6px}
  .theme .eyebrow::before{content:'';width:10px;height:1px;background:var(--acc)}
  .theme .title{margin:0;font-size:14px;font-weight:650;font-family:var(--fhead)}
  .theme .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .theme .tbtn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 8px;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:var(--card2);color:var(--tx);font:inherit;font-size:13px;font-weight:550;cursor:pointer}
  .theme .tbtn svg{color:var(--acc)} .theme .tbtn:hover{border-color:var(--acc)}
  .theme .tbtn.pri{background:var(--acc);color:var(--on);border-color:var(--acc);font-weight:650} .theme .tbtn.pri svg{color:var(--on)}
  .theme .field{width:100%;background:var(--card2);border:var(--bw) solid var(--bd2);border-radius:var(--r);color:var(--tx);font:inherit;font-size:13px;padding:8px 10px}
  .theme .field::placeholder{color:var(--mut)}
  .theme .pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .theme .btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:var(--card2);color:var(--tx);font:inherit;font-size:13px;cursor:pointer}
  .theme .btn svg{color:var(--acc)} .theme .btn.pri{background:var(--acc);color:var(--on);border-color:var(--acc);font-weight:650} .theme .btn.pri svg{color:var(--on)}
  .theme .chip{font-size:10px;color:var(--acc);border:var(--bw) solid var(--bd2);border-radius:var(--r);padding:2px 7px;justify-self:start}
  .theme .row{display:grid;grid-template-columns:46px 1fr auto;gap:10px;align-items:center;padding:8px;border:var(--bw) solid var(--bd);border-radius:var(--r);background:var(--card2)}
  .theme .thumb{width:46px;aspect-ratio:4/3;border:var(--bw) solid var(--bd2);background:rgba(128,128,128,.14);border-radius:calc(var(--r) - 1px)}
  .theme .row .body{min-width:0;display:grid;gap:2px}
  .theme .row .body b{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .theme .meta{font-size:10.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .theme .icobtn{width:28px;height:28px;display:grid;place-items:center;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:transparent;color:var(--mut);cursor:pointer}
  .theme .toast{display:flex;align-items:center;gap:8px;padding:9px 11px;border:var(--bw) solid var(--bd2);border-left:2px solid var(--acc);border-radius:var(--r);background:var(--card);font-size:13px}
  .theme .tk{font-size:9px;letter-spacing:.1em;color:var(--mut)}
  .mono .eyebrow,.mono .meta,.mono .ver,.mono .tk,.mono .chip{font-family:ui-monospace,Menlo,Consolas,monospace}

  
.board{width:344px}.board .hook{font-size:11px;color:#7a7a70;margin:7px 0 0;line-height:1.5;border-left:2px solid #2a2a22;padding-left:8px}
/* ===== 프리미엄 6 ===== */
/* d1 d1 — Tidy Dark Wireframe (Refined) */
/* =====================================================================
   SCOPE = .d1  —  Tidy Dark Wireframe (정돈된 다크 와이어프레임 · Refined)
   먹지 다크 + 마커 옐로. x7 DNA("두 번 그은" 오프셋 그림자 2px2px0 /
   스케치 보더 / 마커 accent / 칸 안 텍스트 또렷)를 단일 체계로 다듬어
   포트폴리오 기준선으로 격상.

   [재작성 핵심]
   · 그림자/링/active를 변수 1세트로 통일 — 랜덤 제거(품질바 3)
   · active = '눌려 어두워짐'으로 방향 교정(이전: 누르는데 밝아짐 → 오류)
   · err 토스트·field hover/active·disabled 가독 등 누락 상태 보강(품질바 1)
   · eyebrow 글로우 에코 gimmick 제거 → 의미있는 '두 번 그은 틱'으로(품질바 4)
   대비(AA 초과): 본문 15.78:1 / 뮤트 6.53:1 / 마커 12.52:1 / 잉크 12.77:1
   ===================================================================== */

/* ── 조작 변수: 통일된 체계 (radius 7 / border 1.5 / 오프셋 2px2px0) ── */
.d1{
  --appbg:#0a0b0d;          /* 먹지 베이스 */
  --card:#15161a;           /* 카드 면 */
  --card2:#0d0e11;          /* 가라앉은 입력/리스트 면 */
  --tx:#eef0ee;             /* 본문 (대비 15.78:1) */
  --mut:#9a9c98;            /* 뮤트 (대비 6.53:1) */
  --acc:#ffd23f;            /* 마커 옐로 (대비 12.52:1) */
  --on:#16140a;             /* 마커 위 잉크 글자 (대비 12.77:1) */
  --bd:#26282d;             /* 헤어라인 */
  --bd2:#3a3d44;            /* 강한 스케치 보더 */
  --r:7px;                  /* 단일 radius 체계 */
  --bw:1.5px;               /* 스케치 보더 두께 */
  --fhead:inherit;          /* 한글 본문 가독성 — 헤드도 시스템 산세리프 */
  --shadow:2px 2px 0 0 rgba(0,0,0,.55); /* x7 "두 번 그은" 오프셋(카드) */
  --blur:0px;

  /* ── 내부 디자인 토큰 (일관성의 단일 출처) ── */
  --d1-off:2px 2px 0 0 rgba(0,0,0,.45);   /* 컨트롤 오프셋(먹) */
  --d1-off-pri:2px 2px 0 0 rgba(0,0,0,.6);/* 마커 면 컨트롤 오프셋 */
  --d1-ring:0 0 0 3px rgba(255,210,63,.32);/* 단일 포커스 링(통일) */
  --d1-acc-soft:rgba(255,210,63,.08);     /* 연한 마커 배경 */
  --d1-press:translate(2px,2px);          /* 표준 가라앉음(오프셋만큼) */
  --d1-press-sm:translate(1px,1px);       /* 소형 컨트롤 가라앉음 */
  --d1-acc2:#e8b400;                      /* 마커 눌림색(active = 어둡게) */
  --d1-t:transform .1s ease, box-shadow .12s ease,
         border-color .14s ease, background-color .14s ease, color .14s ease;

  letter-spacing:.1px;
}

/* 루트 면: 또렷한 오프셋으로 와이어프레임 입체감 */
.d1.theme{ box-shadow:3px 3px 0 0 rgba(0,0,0,.6); }

/* ── 공통 트랜지션 (transform/shadow 포함 — 가라앉는 프레스) ── */
.d1 .tbtn,
.d1 .btn,
.d1 .icobtn,
.d1 .field,
.d1 .ver{ transition:var(--d1-t); }

/* ════════════════════ 헤더 ════════════════════ */
/* [독창 디테일 1] 헤더 밑줄 = 점선 마커 스트로크(와이어프레임 결) */
.d1 .head{
  border-bottom:0;
  background-image:repeating-linear-gradient(
    90deg, var(--acc) 0 8px, transparent 8px 14px);
  background-size:100% var(--bw);
  background-position:0 100%;
  background-repeat:no-repeat;
}
.d1 .head h1{ letter-spacing:-.015em; }
/* 버전 배지: 마커 테두리 알약 */
.d1 .ver{
  border:var(--bw) solid var(--bd2);
  border-radius:999px;
  padding:1px 9px;
  color:var(--mut);
}

/* ════════════════════ 카드 / 라벨 ════════════════════ */
.d1 .card{ box-shadow:var(--shadow); }
.d1 .eyebrow{
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--mut);
}
/* eyebrow 틱: 글로우 에코 제거 → '두 번 그은' 짧은 더블 스트로크(의미있는 장식) */
.d1 .eyebrow::before{
  width:14px; height:var(--bw);
  background:var(--acc);
  box-shadow:0 calc(var(--bw) + 1px) 0 0 var(--bd2); /* 아래로 한 줄 더 — 스케치 결 */
}
.d1 .title{ letter-spacing:-.01em; }

/* ════════════════════ 캡처 툴 버튼 (.tbtn) ════════════════════ */
.d1 .tbtn{ box-shadow:var(--d1-off); }
.d1 .tbtn svg{ color:var(--acc); transition:color .14s ease; }
/* hover: 마커 보더 + 텍스트 강조 + 살짝 떠오르며 그림자 확장 */
.d1 .tbtn:hover{
  border-color:var(--acc);
  color:var(--acc);
  background:var(--d1-acc-soft);
  transform:translate(-1px,-1px);
  box-shadow:3px 3px 0 0 rgba(0,0,0,.5);
}
.d1 .tbtn:hover svg{ color:var(--acc); }
/* focus-visible: 단일 마커 링 + 오프셋 유지 */
.d1 .tbtn:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:var(--d1-off), var(--d1-ring);
}
/* [독창 디테일 2] active: 자기 오프셋 속으로 가라앉음 */
.d1 .tbtn:active{
  transform:var(--d1-press);
  box-shadow:0 0 0 0 rgba(0,0,0,.45);
  background:var(--d1-acc-soft);
}
.d1 .tbtn:disabled{
  opacity:.45;
  cursor:not-allowed;
  border-color:var(--bd);
  color:var(--mut);
  background:var(--card2);
  box-shadow:none;
  transform:none;
}
.d1 .tbtn:disabled svg{ color:var(--mut); }

/* ── 강조 캡처 버튼 (.tbtn.pri): 마커 면 ── */
.d1 .tbtn.pri{ box-shadow:var(--d1-off-pri); }
.d1 .tbtn.pri svg{ color:var(--on); }
.d1 .tbtn.pri:hover{
  background:#ffdd6b;            /* hover = 밝게 */
  border-color:#ffdd6b;
  color:var(--on);
  transform:translate(-1px,-1px);
  box-shadow:3px 3px 0 0 rgba(0,0,0,.62);
}
.d1 .tbtn.pri:hover svg{ color:var(--on); }
.d1 .tbtn.pri:focus-visible{
  outline:none;
  border-color:var(--on);
  box-shadow:var(--d1-off-pri), var(--d1-ring);
}
.d1 .tbtn.pri:active{          /* active = 눌려 어두워짐(방향 교정) */
  background:var(--d1-acc2);
  border-color:var(--d1-acc2);
  transform:var(--d1-press);
  box-shadow:0 0 0 0 rgba(0,0,0,.6);
}
.d1 .tbtn.pri:disabled{
  background:var(--bd2);
  border-color:var(--bd2);
  color:var(--mut);
  opacity:.5;
  box-shadow:none;
  transform:none;
}
.d1 .tbtn.pri:disabled svg{ color:var(--mut); }

/* ════════════════════ 인풋 / textarea (.field) ════════════════════ */
.d1 .field{
  box-shadow:inset 0 1px 0 rgba(0,0,0,.35);
  transition:border-color .14s ease, box-shadow .12s ease;
}
.d1 textarea.field{ resize:vertical; }
.d1 .field:hover{ border-color:var(--bd2); }
/* focus: 마커 보더 + 단일 링, 내부 그림자 제거로 '활성 면' 표현 */
.d1 .field:focus-visible,
.d1 .field:focus{
  outline:none;
  border-color:var(--acc);
  box-shadow:var(--d1-ring);
}
.d1 .field:disabled{
  opacity:.5;
  cursor:not-allowed;
  border-color:var(--bd);
  box-shadow:none;
}
.d1 .field:disabled::placeholder{ color:var(--mut); }

/* ════════════════════ 액션 버튼 (.btn) ════════════════════ */
.d1 .btn{ box-shadow:var(--d1-off); }
.d1 .btn svg{ color:var(--acc); transition:color .14s ease; }
.d1 .btn:hover{
  border-color:var(--acc);
  color:var(--acc);
  background:var(--d1-acc-soft);
  transform:translate(-1px,-1px);
  box-shadow:3px 3px 0 0 rgba(0,0,0,.5);
}
.d1 .btn:hover svg{ color:var(--acc); }
.d1 .btn:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:var(--d1-off), var(--d1-ring);
}
.d1 .btn:active{
  transform:var(--d1-press);
  box-shadow:0 0 0 0 rgba(0,0,0,.45);
  background:var(--d1-acc-soft);
}
.d1 .btn:disabled{
  opacity:.45;
  cursor:not-allowed;
  border-color:var(--bd);
  color:var(--mut);
  background:var(--card2);
  box-shadow:none;
  transform:none;
}
.d1 .btn:disabled svg{ color:var(--mut); }

/* ── 강조 액션 버튼 (.btn.pri) ── */
.d1 .btn.pri{ box-shadow:var(--d1-off-pri); }
.d1 .btn.pri svg{ color:var(--on); }
.d1 .btn.pri:hover{
  background:#ffdd6b;
  border-color:#ffdd6b;
  color:var(--on);
  transform:translate(-1px,-1px);
  box-shadow:3px 3px 0 0 rgba(0,0,0,.62);
}
.d1 .btn.pri:hover svg{ color:var(--on); }
.d1 .btn.pri:focus-visible{
  outline:none;
  border-color:var(--on);
  box-shadow:var(--d1-off-pri), var(--d1-ring);
}
.d1 .btn.pri:active{
  background:var(--d1-acc2);
  border-color:var(--d1-acc2);
  transform:var(--d1-press);
  box-shadow:0 0 0 0 rgba(0,0,0,.6);
}
.d1 .btn.pri:disabled{
  background:var(--bd2);
  border-color:var(--bd2);
  color:var(--mut);
  opacity:.5;
  box-shadow:none;
  transform:none;
}
.d1 .btn.pri:disabled svg{ color:var(--mut); }

/* ════════════════════ 칩 (.chip) ════════════════════ */
.d1 .chip{
  letter-spacing:.06em;
  border-color:var(--bd2);
  color:var(--acc);
  background:var(--d1-acc-soft);
}

/* ════════════════════ 기록 행 (.row) ════════════════════ */
.d1 .row{
  box-shadow:inset 0 1px 0 rgba(0,0,0,.3);
  transition:border-color .14s ease, box-shadow .12s ease;
}
.d1 .row:hover{ border-color:var(--bd2); }
.d1 .row:focus-within{
  border-color:var(--acc);
  box-shadow:inset 0 1px 0 rgba(0,0,0,.3), var(--d1-ring); /* 링 통일(이전 2px→3px) */
}
/* 빈 썸네일: 마커 해치(와이어프레임 placeholder) — 의미있는 결 */
.d1 .thumb{
  background:
    repeating-linear-gradient(45deg,
      rgba(255,210,63,.06) 0 6px, transparent 6px 12px),
    var(--card2);
  border-color:var(--bd2);
}
.d1 .row .body b{ letter-spacing:-.005em; }
.d1 .meta{ color:var(--mut); }

/* ── 아이콘 버튼 (.icobtn) ── */
.d1 .icobtn{ box-shadow:0 0 0 0 rgba(0,0,0,0); } /* active 전환 기준선 */
.d1 .icobtn:hover{
  border-color:var(--acc);
  color:var(--acc);
  transform:var(--d1-press-sm);
  box-shadow:-1px -1px 0 0 rgba(0,0,0,.4); /* 살짝 떠오른 오프셋(소형) */
}
.d1 .icobtn:focus-visible{
  outline:none;
  border-color:var(--acc);
  color:var(--acc);
  box-shadow:var(--d1-ring);
}
.d1 .icobtn:active{
  transform:var(--d1-press-sm);
  background:var(--d1-acc-soft);
  box-shadow:0 0 0 0 rgba(0,0,0,0);
}
.d1 .icobtn:disabled{
  opacity:.4;
  cursor:not-allowed;
  border-color:var(--bd);
  color:var(--bd2);
  background:transparent;
  transform:none;
  box-shadow:none;
}

/* ════════════════════ 핀 인덱스 (.pin) ════════════════════ */
.d1 .pin{
  background:var(--acc);
  color:var(--on);
  border-radius:5px;
  box-shadow:1px 1px 0 0 rgba(0,0,0,.5);
}

/* ════════════════════ 토스트 (.toast) ════════════════════ */
.d1 .toast{
  box-shadow:var(--d1-off);
  border-left-width:3px;
}
.d1 .toast .tk{
  letter-spacing:.14em;
  color:var(--acc);
}
/* 에러 토스트: 같은 오프셋 체계 유지 + 점선 마커 라인으로 구분(일관성) */
.d1 .toast.err{ border-left-style:dashed; }
.d1 .toast.err .tk{ color:var(--acc); }

/* ── 모션 민감 사용자 배려 ── */
@media (prefers-reduced-motion: reduce){
  .d1 .tbtn,
  .d1 .btn,
  .d1 .icobtn,
  .d1 .field,
  .d1 .ver,
  .d1 .row{ transition:none; }
  .d1 .tbtn:hover,  .d1 .btn:hover,
  .d1 .tbtn.pri:hover, .d1 .btn.pri:hover,
  .d1 .icobtn:hover,
  .d1 .tbtn:active, .d1 .btn:active, .d1 .icobtn:active,
  .d1 .tbtn.pri:active, .d1 .btn.pri:active{ transform:none; }
}

/* d2 블루프린트 프리미엄 (.d2) */
/* ============================================================
   SCOPE .d2 — 블루프린트 프리미엄 (Navy Blueprint / Cyan Marker)
   네이비 청사진 + 시안 마커. 엔지니어링 CAD 툴의 정밀함.
   x7 DNA(2px 오프셋 그림자·마커 accent·또렷한 텍스트·크롭마크)를
   '두 번 다듬어' 고급 제도 툴 감성으로. 손맛 랜덤 0, 정밀 100.

   [디렉터 검수 — 1차 대비 교정 요약]
   · (치명) .eyebrow::before 에 content/ display 누락 → 틱이 렌더 안 됨.
     eyebrow 를 inline-flex 로 만들고 틱을 실제 datum 마커로 재구현.
   · 누락 클래스 보강: .empty / .toast.err / .pin / .kbd / .dl,dt,dd / .title(h2) 마진.
   · 그리드 노이즈 절제: 페이지·카드 이중 32+8px 그리드는 336px 폭에서
     본문 가독성을 해침 → 페이지는 메이저만, 카드는 옅은 단일 그리드로 통일.
   · radius 체계 통일(카드/버튼/필드 8 · 썸네일/아이콘/칩보조 6 · pill 999).
   · 오프셋 그림자·focus 링·hover lift 레시피를 토큰으로 통일(랜덤 제거).
   · 한글 본문/제목은 시스템 산세리프, 모노는 라벨(eyebrow·ver·meta·chip·kbd)
     한정 — 본문 모노 강제 금지. 텍스트 대비 WCAG AA 충족.
   ============================================================ */

.d2{
  /* ── 조작 변수 ─────────────────────────────── */
  --appbg:#0a1f3a;          /* 청사진 시트 베이스 네이비 */
  --card:#0f2748;           /* 카드 — 한 단계 밝은 청사진 */
  --card2:#0b2038;          /* 입력/보조 표면 — 한 단계 어둡게 */
  --tx:#eaf3fb;             /* 본문 — 차가운 화이트, 대비 13:1↑ */
  --mut:#a9cbe6;            /* 보조 — 시안빛 그레이, --card2 위 7:1↑ (AA 여유) */
  --acc:#46d8e6;            /* 시안 마커 (datum/accent) */
  --on:#04222c;             /* accent 채움 위 텍스트, 대비 9.6:1 */
  --bd:#274a73;             /* 가는 제도 헤어라인 */
  --bd2:#46d8e6;            /* 시안 잉크 보더(강조 윤곽) */
  --r:8px;                  /* 통일 radius (보조 6 / pill 999) */
  --bw:1px;                 /* 정밀 1px 라인 */
  --fhead:ui-monospace,"SFMono-Regular",Consolas,"Courier New",monospace; /* 라벨/eyebrow 한정 제도 모노 */
  --shadow:2px 2px 0 0 rgba(3,12,26,.55);  /* x7 오프셋 — 정밀 깊이 */
  --blur:0px;

  /* ── 내부 토큰(테마 일관 체계) ── */
  --r-sm:6px;                            /* 썸네일·아이콘·보조 radius */
  --d2-font:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  --d2-ink:rgba(70,216,230,.85);         /* 시안 잉크(크롭마크) */
  --d2-grid:rgba(70,216,230,.055);       /* 단일 그리드 라인(절제) */
  --d2-depth:rgba(3,12,26,.55);          /* 오프셋 깊이 */
  --d2-cyan-shadow:rgba(70,216,230,.22); /* 시안 투영선 */
  --d2-focus:rgba(70,216,230,.5);        /* focus 링 */
  --d2-hover-bg:#11305a;                 /* 컨트롤 hover 표면 */
  --d2-active-bg:#0d294e;                /* 컨트롤 active 표면 */
  --d2-line-hover:#3a679a;               /* 중립 hover 보더 */
  --d2-danger:#ff7a90;                   /* 에러 시안 톤과 구별되는 코랄, --card 위 AA */

  position:relative;
  color:var(--tx);
  font-family:var(--d2-font);
  background:
    /* 좌표 그리드 — 메이저 32px 한 겹만(시트 느낌, 노이즈 절제) */
    linear-gradient(var(--d2-grid) 1px,transparent 1px) 0 0/32px 32px,
    linear-gradient(90deg,var(--d2-grid) 1px,transparent 1px) 0 0/32px 32px,
    /* 시트 톤 — 좌상단 광원 */
    radial-gradient(135% 100% at 14% -6%,#143560 0%,#0d264a 48%,var(--appbg) 100%);
  border-color:var(--bd);
  border-radius:var(--r);
  letter-spacing:.1px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ── head: 하단 기준선(datum line) ── */
.d2 .head{ border-bottom-color:var(--bd); }
.d2 .head h1{
  margin:0;
  color:var(--tx);
  font-weight:680;
  letter-spacing:-.01em;
  display:inline-block;
  padding-bottom:3px;
  /* 시안 마커 밑줄 — 정밀 2px 라인 */
  background:linear-gradient(var(--acc),var(--acc)) left 100%/100% 2px no-repeat;
}
.d2 .ver{
  font-family:var(--fhead);
  color:var(--acc);
  font-size:10px;
  font-weight:600;
  letter-spacing:.04em;
  line-height:1;
  padding:3px 7px;
  border:var(--bw) solid var(--bd);
  border-radius:var(--r-sm);
  background:var(--card2);
}

/* ── (DNA) 카드 = 청사진 시트: 옅은 단일 그리드 + 4코너 등록 표식 ── */
.d2 .card{
  position:relative;
  background:
    /* 카드 내부 32px 그리드 한 겹(제도지, 본문 방해 최소) */
    linear-gradient(var(--d2-grid) 1px,transparent 1px) 0 0/32px 32px,
    linear-gradient(90deg,var(--d2-grid) 1px,transparent 1px) 0 0/32px 32px,
    /* 상단 시안 글로우 — 시트 가장자리 빛 */
    linear-gradient(180deg,rgba(70,216,230,.05),transparent 38%),
    var(--card);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r);
  /* x7 오프셋: 시안 투영선(1px) + 깊이(2px) 이중 — '두 번 그은' 정밀 재해석 */
  box-shadow:
    0 0 0 1px rgba(70,216,230,.06),
    var(--shadow);
}
/* 독창 디테일 ①: 좌상단·우하단 L자 등록 표식(대각 크롭 마크 → 도면 프레임) */
.d2 .card::before,
.d2 .card::after{
  content:"";
  position:absolute;
  width:12px; height:12px;
  pointer-events:none;
  opacity:.9;
}
.d2 .card::before{
  top:6px; left:6px;
  border-top:var(--bw) solid var(--d2-ink);
  border-left:var(--bw) solid var(--d2-ink);
}
.d2 .card::after{
  bottom:6px; right:6px;
  border-bottom:var(--bw) solid var(--d2-ink);
  border-right:var(--bw) solid var(--d2-ink);
}

/* ── eyebrow: 제도 datum(기준점) 라벨 — 모노 + datum 틱 ── */
.d2 .eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:var(--fhead);
  color:var(--mut);
  text-transform:uppercase;
  letter-spacing:.16em;
  font-size:10px;          /* 9.5→10: 모노 대문자 한글혼용 가독성 확보 */
  font-weight:600;
  line-height:1;
}
/* 독창 디테일 ②: ::before 틱 = datum 마커(시안 정사각 + 좌우 연장 눈금)
   (1차의 치명 결함: content/display 누락으로 미렌더 → 여기서 실체화) */
.d2 .eyebrow::before{
  content:"";
  flex:0 0 auto;
  width:7px; height:7px;
  background:var(--acc);
  border-radius:1px;
  /* 좌우 연장 눈금 — 제도 기준선 느낌 */
  box-shadow:
    -5px 0 0 -2.5px var(--acc),
     12px 0 0 -2.5px var(--acc);
}

/* ── title (h2) ── */
.d2 .title{
  margin:0;
  color:var(--tx);
  font-weight:660;
  letter-spacing:-.01em;
  font-size:14px;
  line-height:1.3;
}

/* ── 공통 컨트롤 베이스 (tbtn · btn) — DNA hairline 박스 ── */
.d2 .tbtn,
.d2 .btn{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r);
  font:inherit;
  font-weight:560;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:transform .1s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease, color .12s ease;
}
.d2 .tbtn svg,
.d2 .btn svg{ color:var(--acc); transition:color .12s ease; flex:0 0 auto; }

.d2 .tbtn:hover,
.d2 .btn:hover{
  border-color:var(--acc);
  background:var(--d2-hover-bg);
  transform:translate(-1px,-1px);
  box-shadow:1px 1px 0 0 var(--d2-cyan-shadow), 3px 3px 0 0 var(--d2-depth);
}
.d2 .tbtn:focus-visible,
.d2 .btn:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:0 0 0 2px var(--appbg), 0 0 0 4px var(--d2-focus), var(--shadow);
}
.d2 .tbtn:active,
.d2 .btn:active{
  transform:translate(1px,1px);
  box-shadow:0 0 0 0 var(--d2-depth);
  background:var(--d2-active-bg);
}
.d2 .tbtn:disabled,
.d2 .btn:disabled{
  opacity:.45;
  cursor:not-allowed;
  border-style:dashed;
  border-color:var(--bd);
  background:var(--card2);
  box-shadow:none;
  transform:none;
}
.d2 .tbtn:disabled svg,
.d2 .btn:disabled svg{ color:var(--mut); }

/* pri: 시안 마커 채움 */
.d2 .tbtn.pri,
.d2 .btn.pri{
  background:linear-gradient(180deg,#5ee2ef,var(--acc));
  color:var(--on);
  border-color:var(--acc);
  font-weight:680;
  box-shadow:1px 1px 0 0 rgba(70,216,230,.3), 2px 2px 0 0 var(--d2-depth);
}
.d2 .tbtn.pri svg,
.d2 .btn.pri svg{ color:var(--on); }
.d2 .tbtn.pri:hover,
.d2 .btn.pri:hover{
  background:linear-gradient(180deg,#74ebf6,#54dfec);
  transform:translate(-1px,-1px);
  box-shadow:1px 1px 0 0 rgba(70,216,230,.4), 3px 3px 0 0 var(--d2-depth);
}
.d2 .tbtn.pri:focus-visible,
.d2 .btn.pri:focus-visible{
  box-shadow:0 0 0 2px var(--appbg), 0 0 0 4px var(--d2-focus), 2px 2px 0 0 var(--d2-depth);
}
.d2 .tbtn.pri:active,
.d2 .btn.pri:active{
  transform:translate(1px,1px);
  box-shadow:0 0 0 0 var(--d2-depth);
  background:linear-gradient(180deg,#46d8e6,#3ac4d2);
}

/* ── 인풋/텍스트에어리어: 청사진 데이터 필드 ── */
.d2 .field{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r);
  font:inherit;
  /* 내측 깊이 — 음각된 입력 슬롯 */
  box-shadow:inset 1px 1px 0 0 rgba(3,12,26,.5);
  transition:border-color .12s ease, box-shadow .12s ease;
}
.d2 .field::placeholder{ color:var(--mut); opacity:1; }
.d2 .field:hover{ border-color:var(--d2-line-hover); }
.d2 .field:focus,
.d2 .field:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:inset 1px 1px 0 0 rgba(3,12,26,.5), 0 0 0 3px var(--d2-focus);
}
.d2 .field:disabled{
  opacity:.5;
  cursor:not-allowed;
  border-style:dashed;
  box-shadow:none;
}

/* ── chip: 청사진 태그 라벨 ── */
.d2 .chip{
  display:inline-flex;
  align-items:center;
  font-family:var(--fhead);
  color:var(--acc);
  font-size:11px;
  letter-spacing:.06em;
  background:rgba(70,216,230,.08);
  border:var(--bw) solid var(--bd2);
  border-radius:999px;
  padding:2px 10px;
}

/* ── row: 부품 명세 항목(BOM row) ── */
.d2 .row{
  background:var(--card2);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r);
  transition:border-color .12s ease, background .12s ease;
}
.d2 .row:hover{ border-color:var(--d2-line-hover); background:#0e2742; }

/* pin: row 안 번호 배지(핀 메모) — 시안 datum 번호 (1차 누락 보강) */
.d2 .pin{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:22px; height:22px;
  padding:0 4px;
  font-family:var(--fhead);
  font-size:11px;
  font-weight:700;
  color:var(--on);
  background:var(--acc);
  border-radius:var(--r-sm);
  box-shadow:1px 1px 0 0 var(--d2-depth);
}

/* 썸네일: 빈 도면 셀 — 좌표 십자(센터 마크) */
.d2 .thumb{
  background:
    linear-gradient(rgba(70,216,230,.14) 1px,transparent 1px) center/100% 50%,
    linear-gradient(90deg,rgba(70,216,230,.14) 1px,transparent 1px) center/50% 100%,
    var(--card);
  background-repeat:no-repeat;
  background-position:center;
  border:var(--bw) solid var(--bd);
  border-radius:var(--r-sm);
}
.d2 .row .body b{ color:var(--tx); font-weight:620; }
.d2 .meta{ font-family:var(--fhead); color:var(--mut); font-size:11px; letter-spacing:.02em; }

/* ── icobtn: 정밀 아이콘 버튼 ── */
.d2 .icobtn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:var(--card);
  color:var(--mut);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r-sm);
  cursor:pointer;
  transition:transform .1s ease, color .12s ease, border-color .12s ease, box-shadow .12s ease, background .12s ease;
}
.d2 .icobtn:hover{
  color:var(--acc);
  border-color:var(--acc);
  background:var(--d2-hover-bg);
  box-shadow:1px 1px 0 0 var(--d2-cyan-shadow);
}
.d2 .icobtn:focus-visible{
  outline:none;
  color:var(--acc);
  border-color:var(--acc);
  box-shadow:0 0 0 2px var(--appbg), 0 0 0 4px var(--d2-focus);
}
.d2 .icobtn:active{
  transform:translate(1px,1px);
  box-shadow:none;
  background:var(--d2-active-bg);
}
.d2 .icobtn:disabled{
  opacity:.45;
  cursor:not-allowed;
  border-style:dashed;
  box-shadow:none;
  transform:none;
}

/* ── empty: 빈 상태 — 점선 도면 프레임 (1차 누락 보강) ── */
.d2 .empty{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:22px 12px;
  text-align:center;
  color:var(--mut);
  border:var(--bw) dashed var(--bd);
  border-radius:var(--r);
  background:
    linear-gradient(var(--d2-grid) 1px,transparent 1px) 0 0/16px 16px,
    linear-gradient(90deg,var(--d2-grid) 1px,transparent 1px) 0 0/16px 16px,
    var(--card2);
}
.d2 .empty svg{ color:var(--acc); opacity:.55; }
.d2 .empty p{ margin:0; font-size:12.5px; color:var(--mut); line-height:1.45; }

/* ── 단축키 dl — 제도 명세표 (1차 누락 보강) ── */
.d2 .dl{ margin:0; }
.d2 .dl dt{ color:var(--mut); font-size:12.5px; }
.d2 .dl dd{ margin:0; }
.d2 .kbd{
  display:inline-flex;
  align-items:center;
  font-family:var(--fhead);
  font-size:11px;
  font-weight:600;
  letter-spacing:.02em;
  color:var(--acc);
  background:var(--card2);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r-sm);
  padding:2px 7px;
  /* 키캡 음각감 — 절제된 inset */
  box-shadow:inset 0 -1px 0 0 rgba(3,12,26,.5);
}

/* ── toast: 청사진 알림 라벨 — 좌측 시안 datum bar ── */
.d2 .toast{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--card);
  color:var(--tx);
  border:var(--bw) solid var(--bd);
  border-left:3px solid var(--acc);
  border-radius:var(--r);
  box-shadow:var(--shadow);
}
.d2 .tk{
  flex:0 0 auto;
  font-family:var(--fhead);
  font-size:10px;
  font-weight:700;
  color:var(--acc);
  letter-spacing:.12em;
}
/* err 변형: 코랄 datum bar + 코랄 태그 (1차 누락 보강 — 시안과 명확히 구별) */
.d2 .toast.err{
  border-color:var(--bd);
  border-left-color:var(--d2-danger);
}
.d2 .toast.err .tk{ color:var(--d2-danger); }

/* ── 모션 접근성: 감속 선호 시 트랜지션/리프트 억제 ── */
@media (prefers-reduced-motion:reduce){
  .d2 *{ transition-duration:.01ms !important; }
  .d2 .tbtn:hover,
  .d2 .btn:hover,
  .d2 .tbtn:active,
  .d2 .btn:active,
  .d2 .icobtn:active{ transform:none; }
}

/* d3 만년필 잉크 (다크) */
/* =========================================================================
   SCOPE .d3 — 만년필 잉크 (다크 / Fountain Pen Ink)
   딥 잉크블루·차콜 종이 + 만년필 한 톤. 가는 닙 보더, 절제된 손맛,
   에디토리얼하게 차분하고 지적인 고급감.

   [폴리시 요약]
   - 통일 체계 확립: radius=9px(작은 면 --r-2px), 보더 1px(헤어라인 통일),
     "두 번 그은" 오프셋 그림자는 2px 1색(--ink-off) 규칙으로 전 컴포넌트 통일.
   - 한글 가독: 본문/제목은 시스템 sans 상속, 세리프는 --fhead 한정.
     본문 텍스트 대비 WCAG AA(4.5:1↑) 충족, .pri 잉크채움 위 텍스트도 AA 확보.
   - 전 인터랙티브에 hover / focus-visible / active / :disabled 정의.
   - prefers-reduced-motion 존중(트랜지션 무력화).
   - 시그니처 디테일: ①eyebrow 만년필 닙(역삼각) 잉크점 ②카드 좌상단 코너에
     겹친 두 번째 잉크 자국 ③.pri 상단 1px "잉크 고임" 하이라이트.
   ========================================================================= */

.d3{
  /* ----- 조작 변수 ----- */
  --appbg:
    /* 닙으로 그은 듯한 아주 옅은 가로 괘선(노트) */
    repeating-linear-gradient(0deg, rgba(125,150,205,.020) 0 1px, transparent 1px 30px),
    /* 좌상단에서 번지는 잉크빛 비네팅 */
    radial-gradient(135% 100% at 14% -8%, #1b2334 0%, #141a27 52%, #0f1320 100%);
  --card:#161d2b;          /* 차콜 잉크 종이 */
  --card2:#111726;         /* 가라앉은 면(입력·리스트) */
  --tx:#eef1f7;            /* 본문 — 또렷한 종이빛 (vs --card ≈ 13:1, AA 통과) */
  --mut:#9fadc8;           /* 차분한 잉크그레이 보조 (vs --card ≈ 6.0:1, AA 본문 통과) */
  --acc:#5d8aec;           /* 만년필 딥블루 잉크(한 톤 상향 — 어두운 잉크지 텍스트 대비 확보) */
  --on:#08101f;            /* 잉크 채움 위 텍스트(어두운 잉크지) — 그라데 바닥 #4670c8 대비 ≈ 6.4:1 */
  --bd:#2a374e;            /* 가는 펜 헤어라인 */
  --bd2:#41547a;           /* 잉크 보더(강) */
  --r:9px;
  --bw:1px;                /* 만년필 닙 — 가는 보더 통일 */
  --fhead:'Iowan Old Style','Palatino Linotype','Georgia','Times New Roman',serif;
  --shadow:0 8px 26px -16px rgba(0,0,0,.72);   /* 카드 부양감(아주 절제) */
  --blur:0px;

  position:relative;
  background:var(--appbg);
  color:var(--tx);
  letter-spacing:.1px;
  border-color:var(--bd2);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;

  /* 톤 전용 파생 토큰(가독·일관성용) */
  --r2:calc(var(--r) - 2px);              /* 작은 면 라디우스(통일) */
  --r3:calc(var(--r) - 3px);              /* 더 작은 칩/배지 라디우스 */
  --ink-off:rgba(16,26,52,.62);           /* "두 번 그은" 오프셋 그림자 색(통일) */
  --surf-hi:#1a2436;                      /* hover 시 떠오른 잉크면(토큰화) */
  --surf-row-hi:#151d2f;                  /* row hover 면 */
  --acc-soft:rgba(93,138,236,.15);
  --acc-ring:rgba(93,138,236,.42);
  --acc-line:linear-gradient(var(--acc), var(--acc));
  --err:#ec6a82;                          /* 에러 잉크(붉은 닙) — 카드 위 AA */
  --inset-deep:inset 0 1px 2px rgba(0,0,0,.34);
  --grad-pri:linear-gradient(168deg, #7aa1f1 0%, #5d8aec 52%, #4670c8 100%);
  --tr:.13s cubic-bezier(.2,0,0,1);       /* 통일 트랜지션 타이밍 */
}

/* 모션 민감 사용자 — 트랜지션/애니메이션 무력화 */
@media (prefers-reduced-motion: reduce){
  .d3 *{transition-duration:.001ms !important; animation-duration:.001ms !important;}
}

/* ===== HEAD — 워드마크는 세리프 + 만년필 잉크 밑줄, 버전은 잉크 라벨 ===== */
.d3 .head{
  border-bottom-color:transparent;
  /* 헤어라인을 잉크가 옅어지는 그라데로 — 에디토리얼 디테일 */
  background-image:linear-gradient(90deg, var(--bd2), rgba(65,84,122,.25) 62%, transparent);
  background-size:100% var(--bw);
  background-position:0 100%;
  background-repeat:no-repeat;
}
.d3 .head h1{
  font-family:var(--fhead);
  font-weight:600;
  letter-spacing:.1px;
  color:var(--tx);
  display:inline-block;
  padding-bottom:3px;
  /* 만년필로 한 줄 그은 잉크 언더라인 */
  background:var(--acc-line) left bottom / 100% 2px no-repeat;
}
.d3 .ver{
  font-family:var(--fhead);
  font-style:italic;
  color:var(--mut);
  letter-spacing:.2px;
}

/* ===== CARD — 펜으로 단정히 친 박스: 가는 잉크 보더 + 두 번 그은 오프셋 ===== */
.d3 .card{
  position:relative;
  background:
    /* 상단 모서리에 잉크 번짐 */
    radial-gradient(150% 120% at 100% 0%, var(--acc-soft), transparent 46%),
    linear-gradient(180deg, rgba(93,138,236,.045), transparent 34%),
    var(--card);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r);
  /* x7 DNA: 한 번 더 그은 듯한 오프셋(2px) + 절제된 부양 그림자 */
  box-shadow:2px 2px 0 0 var(--ink-off), var(--shadow);
}
/* (시그니처 디테일) 좌상단 코너에 살짝 겹친 두 번째 잉크 자국 — 정돈된 손맛 */
.d3 .card::before{
  content:"";
  position:absolute;
  inset:-1px auto auto -1px;
  width:14px;height:14px;
  border-top:var(--bw) solid var(--bd2);
  border-left:var(--bw) solid var(--bd2);
  border-radius:var(--r) 0 0 0;
  opacity:.55;
  pointer-events:none;
}

/* ===== EYEBROW — (시그니처 디테일) 틱을 만년필 닙(역삼각) 잉크점으로 ===== */
.d3 .eyebrow{
  font-family:var(--fhead);
  font-style:italic;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--mut);
}
.d3 .eyebrow::before{
  width:9px;height:9px;
  background:var(--acc);
  border-radius:1px;
  /* 닙(촉) 실루엣: 아래로 뾰족 + 살짝 기울임 */
  clip-path:polygon(50% 100%, 0 0, 100% 0);
  transform:rotate(-8deg) translateY(-.5px);
}

/* ===== TITLE — 세리프 헤더(한글은 시스템 세리프 폴백, 가독 유지) ===== */
.d3 .title{
  font-family:var(--fhead);
  font-weight:600;
  color:var(--tx);
}

/* ===== TOOLS / TBTN — 정제된 잉크 박스(2열). 전 상태 정의 ===== */
.d3 .tbtn{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r);
  box-shadow:2px 2px 0 0 var(--ink-off);
  transition:transform var(--tr), box-shadow var(--tr),
             border-color var(--tr), background-color var(--tr);
}
.d3 .tbtn svg{color:var(--acc); transition:color var(--tr);}
.d3 .tbtn:hover{
  background:var(--surf-hi);
  border-color:var(--acc);
  transform:translate(-1px,-1px);
  box-shadow:3px 3px 0 0 var(--ink-off);
}
.d3 .tbtn:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:2px 2px 0 0 var(--ink-off), 0 0 0 3px var(--acc-ring);
}
.d3 .tbtn:active{
  transform:translate(1px,1px);
  box-shadow:0 0 0 0 var(--ink-off);
}
.d3 .tbtn:disabled{
  opacity:.42;
  cursor:not-allowed;
  transform:none;
  box-shadow:1px 1px 0 0 var(--ink-off);
  border-color:var(--bd);
}
.d3 .tbtn:disabled svg{color:var(--mut);}
/* pri — (시그니처) 닙에서 잉크 고이듯 상단 1px 하이라이트 + 잉크 그라데 채움 */
.d3 .tbtn.pri{
  background:var(--grad-pri);
  color:var(--on);
  border-color:#3a5fb0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.30), 2px 2px 0 0 var(--ink-off);
}
.d3 .tbtn.pri svg{color:var(--on);}
.d3 .tbtn.pri:hover{
  filter:brightness(1.06);
  border-color:#3a5fb0;
  background:var(--grad-pri);   /* hover에서도 잉크 채움 유지 */
}
.d3 .tbtn.pri:focus-visible{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.30), 2px 2px 0 0 var(--ink-off), 0 0 0 3px var(--acc-ring);
}
.d3 .tbtn.pri:active{filter:brightness(.95); transform:translate(1px,1px);}
.d3 .tbtn.pri:disabled{filter:none; opacity:.42;}

/* ===== FIELD (input·textarea·select) — 가라앉은 잉크 면 + 닙 포커스 ===== */
.d3 .field{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r);
  box-shadow:var(--inset-deep);
  transition:border-color var(--tr), box-shadow var(--tr);
}
.d3 .field::placeholder{color:var(--mut); opacity:1;}
.d3 .field:hover{border-color:var(--bd2);}
.d3 .field:focus,
.d3 .field:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:var(--inset-deep), 0 0 0 3px var(--acc-ring);
}
.d3 .field:disabled{
  opacity:.5;
  cursor:not-allowed;
  background:var(--card);
}

/* ===== PAIR / BTN — 펜으로 박스 친 액션. 전 상태 정의 ===== */
.d3 .btn{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r);
  box-shadow:2px 2px 0 0 var(--ink-off);
  transition:transform var(--tr), box-shadow var(--tr),
             border-color var(--tr), background-color var(--tr);
}
.d3 .btn svg{color:var(--acc); transition:color var(--tr);}
.d3 .btn:hover{
  background:var(--surf-hi);
  border-color:var(--acc);
  transform:translate(-1px,-1px);
  box-shadow:3px 3px 0 0 var(--ink-off);
}
.d3 .btn:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:2px 2px 0 0 var(--ink-off), 0 0 0 3px var(--acc-ring);
}
.d3 .btn:active{
  transform:translate(1px,1px);
  box-shadow:0 0 0 0 var(--ink-off);
}
.d3 .btn:disabled{
  opacity:.42;
  cursor:not-allowed;
  transform:none;
  box-shadow:1px 1px 0 0 var(--ink-off);
  border-color:var(--bd);
}
.d3 .btn:disabled svg{color:var(--mut);}
.d3 .btn.pri{
  background:var(--grad-pri);
  color:var(--on);
  border-color:#3a5fb0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.30), 2px 2px 0 0 var(--ink-off);
}
.d3 .btn.pri svg{color:var(--on);}
.d3 .btn.pri:hover{filter:brightness(1.06); border-color:#3a5fb0; background:var(--grad-pri);}
.d3 .btn.pri:focus-visible{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.30), 2px 2px 0 0 var(--ink-off), 0 0 0 3px var(--acc-ring);
}
.d3 .btn.pri:active{filter:brightness(.95); transform:translate(1px,1px);}
.d3 .btn.pri:disabled{filter:none; opacity:.42;}

/* ===== CHIP — 펜으로 동그라미 친 주석(절제) ===== */
.d3 .chip{
  font-family:var(--fhead);
  font-style:italic;
  background:var(--acc-soft);
  color:#b6ccf8;                /* 칩 배경(잉크 위) 위 가독 확보(AA ≈ 8:1) */
  border:var(--bw) solid var(--bd2);
  border-radius:999px;
  letter-spacing:.04em;
}

/* ===== ROW (히스토리·핀) — 가라앉은 잉크 카드 ===== */
.d3 .row{
  background:var(--card2);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.26);
  transition:border-color var(--tr), background-color var(--tr);
}
.d3 .row:hover{
  border-color:var(--bd2);
  background:var(--surf-row-hi);
}
/* 키보드로 포커스 들어온 행(내부 컨트롤 보유 시) — 닙 링으로 위치 표시 */
.d3 .row:focus-within{
  border-color:var(--acc);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.26), 0 0 0 2px var(--acc-ring);
}
/* row 내부 input(.field)이 들어와도 inset 중복 안 거슬리게 살짝 정돈 */
.d3 .row .field{box-shadow:none;}
.d3 .row .field:focus,
.d3 .row .field:focus-visible{box-shadow:0 0 0 2px var(--acc-ring);}

/* 썸네일: 빈 placeholder를 만년필 사선 한 획으로 — 정돈된 와이어프레임 */
.d3 .thumb{
  background:
    linear-gradient(135deg, transparent calc(50% - 1px), var(--bd2) calc(50% - 1px), var(--bd2) calc(50% + 1px), transparent calc(50% + 1px)),
    var(--card);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r2);
}
.d3 .row .body b{font-family:var(--fhead);font-weight:600;color:var(--tx);}
.d3 .meta{color:var(--mut);}

/* ===== ICOBTN — 아이콘 버튼. 전 상태 정의 ===== */
.d3 .icobtn{
  background:transparent;
  color:var(--mut);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r2);
  transition:color var(--tr), border-color var(--tr),
             transform var(--tr), background-color var(--tr);
}
.d3 .icobtn:hover{
  color:var(--acc);
  border-color:var(--acc);
  background:var(--acc-soft);
}
.d3 .icobtn:focus-visible{
  outline:none;
  color:var(--acc);
  border-color:var(--acc);
  box-shadow:0 0 0 3px var(--acc-ring);
}
.d3 .icobtn:active{transform:translateY(1px) scale(.96);}
.d3 .icobtn:disabled{
  opacity:.4;
  cursor:not-allowed;
  transform:none;
  color:var(--mut);
  border-color:var(--bd);
  background:transparent;
}

/* ===== TOAST — 잉크로 적은 메모. 좌측 잉크 마진 라인 ===== */
.d3 .toast{
  position:relative;
  background:
    linear-gradient(180deg, rgba(93,138,236,.06), transparent 40%),
    var(--card);
  color:var(--tx);
  border:var(--bw) solid var(--bd);
  border-left:2px solid var(--acc);
  border-radius:var(--r);
  box-shadow:2px 2px 0 0 var(--ink-off), var(--shadow);
}
.d3 .toast::before{content:"\2712";color:var(--acc);margin-right:2px;font-size:12px;line-height:1;}
.d3 .toast.err{border-left-color:var(--err);}
.d3 .toast.err::before{color:var(--err);}
.d3 .tk{
  font-family:var(--fhead);
  font-style:italic;
  letter-spacing:.12em;
  color:var(--mut);
}
.d3 .toast.err .tk{color:var(--err);}

/* ===== 핀 배지(.pin, 일부 마크업에서 사용) — 잉크 채움 닙 톤 ===== */
.d3 .pin{
  background:var(--grad-pri);
  color:var(--on);
  border-radius:var(--r3);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.26), 1px 1px 0 0 var(--ink-off);
}

/* ===== EMPTY / KBD / DL (있을 경우 톤 정합) ===== */
.d3 .empty{color:var(--mut);}
.d3 .empty svg{opacity:.5;}
.d3 .kbd{
  font-family:var(--fhead);
  color:var(--mut);
  background:var(--card2);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r3);
}
.d3 .dl dt{color:var(--mut);}


/* d4 라이트 제도지 프리미엄 */
/* ============================================================
   SCOPE .d4 — 라이트 제도지 프리미엄 (Drafting Vellum)
   미색 고급 제도지 + 차콜 잉크 + 레드펜 한 점
   - 본문/제목 차콜 잉크 = WCAG AA 이상 고대비(한글 가독 최우선)
   - 통일 체계: r=10px, bw=1.5px, 오프셋 그림자 2px 2px 0 0
   - 그림자는 단 하나의 '차콜 잉크' 스케일에서만 파생(랜덤 금지)
   - 레드펜은 강조점에만(eyebrow 틱 / focus / pri / chip / 코너마크)
   ============================================================ */
.d4{
  /* ===== 조작 변수 ===== */
  --appbg:
    /* 옅은 제도지 모눈(차콜 헤어라인) */
    repeating-linear-gradient(0deg,  rgba(48,44,38,.038) 0 1px, transparent 1px 26px),
    repeating-linear-gradient(90deg, rgba(48,44,38,.038) 0 1px, transparent 1px 26px),
    /* 따뜻한 미색 종이 베르가(좌상단 광원) */
    radial-gradient(135% 100% at 14% -6%, #fdfbf4 0%, #f6f0e2 54%, #efe7d4 100%);
  --card:#fffdf8;            /* 흰 제도지(카드) */
  --card2:#f7f1e4;           /* 미색 메모지(보조면) */
  --tx:#211e19;             /* 차콜 잉크(본문) — paper #fffdf8 대비 약 15:1 */
  --mut:#5f594a;            /* 연필 그레이(보조) — card2 대비 약 6:1 (AA 본문 충족) */
  --acc:#cf2f23;            /* 레드펜(버밀리언) — 흰 위 텍스트 대비 약 4.7:1 */
  --on:#fffdf8;             /* 레드펜 채움 위 텍스트(흰 종이빛) */
  --bd:#c0b69f;             /* 연필 헤어라인(옅은 보더) */
  --bd2:#2a2620;            /* 차콜 마커 잉크 보더(진한 윤곽) */
  --r:10px;
  --bw:1.5px;
  --fhead:"Segoe Print","Bradley Hand",ui-rounded,system-ui,sans-serif; /* 라벨/제목 손글씨 톤(한글은 시스템 폴백) */
  --shadow:2px 2px 0 0 rgba(42,38,32,.18);  /* 두 번 그은 차콜 오프셋(절제) — 변수 계약 유지 */
  --blur:0px;

  /* ===== 통일 디자인 토큰 — 그림자는 모두 이 잉크 한 색에서 파생 ===== */
  --ink-1:rgba(38,34,28,.16);          /* 평면 기본(약) */
  --ink-2:rgba(38,34,28,.30);          /* 평면 기본(주) */
  --ink-3:rgba(38,34,28,.46);          /* 들린 상태 */
  --sh:2px 2px 0 0 var(--ink-2);       /* 기본 오프셋 그림자(두 번 그은 톤) */
  --sh-up:3px 3px 0 0 var(--ink-3);    /* hover — 한 칸 들림 */
  --sh-down:1px 1px 0 0 var(--ink-1);  /* active — 눌림 */
  --ring:0 0 0 3px rgba(207,47,35,.30);/* 레드펜 focus 링 */
  --inset:inset 1px 1px 0 0 rgba(42,38,32,.05); /* 입력 안쪽 자국 */
  --ease:transform .09s ease, box-shadow .09s ease, border-color .12s ease, background-color .12s ease, color .12s ease;

  position:relative;
  background:var(--appbg);
  color:var(--tx);
  border-color:var(--bd2);
  letter-spacing:.1px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.d4 *{ box-sizing:border-box; }

/* 본문 폰트는 한글 고가독 시스템 산세리프 강제(손글씨/모노 본문 금지) */
.d4,
.d4 .field,
.d4 .tbtn,
.d4 .btn,
.d4 .chip,
.d4 .row .body,
.d4 .meta,
.d4 .toast{
  font-family:system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
}

/* ===== HEAD — 워드마크 + 레드펜 밑줄, 버전은 잉크 라벨 ===== */
.d4 .head{ border-bottom-color:var(--bd); }
.d4 .head h1{
  font-family:var(--fhead);
  color:var(--tx);
  display:inline-block;
  padding-bottom:2px;
  /* 레드펜으로 쓱 그은 밑줄 — 끝이 살짝 가늘어지는 마커 톤 */
  background:linear-gradient(var(--acc),var(--acc)) left 100% / 100% 3px no-repeat;
  border-radius:1px;
}
.d4 .ver{
  font-family:var(--fhead);
  color:var(--mut);
  background:var(--card2);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r) 4px var(--r) 5px;  /* 손으로 친 비대칭 모서리 — 독창 디테일 */
  padding:1px 8px;
  box-shadow:var(--sh-down);
}

/* ===== CARD — 차콜 마커 박스 + 좌측 제도지 여백 룰선 + 등록 코너 마크 ===== */
.d4 .card{
  position:relative;
  background:
    /* 좌측 여백 룰선(제도지 마진) — 옅은 레드펜 세로선 */
    linear-gradient(90deg, transparent 0 13px, rgba(207,47,35,.15) 13px 14px, transparent 14px),
    /* 종이 상단 옅은 광 */
    linear-gradient(180deg, rgba(255,255,255,.50), transparent 40%),
    var(--card);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:13px 13px 14px 18px;  /* 좌측 룰선만큼 본문 들여쓰기 */
}
/* 독창 디테일 ① 좌상단 레드펜 '등록 코너 마크'(+자 핀) */
.d4 .card::before{
  content:"";
  position:absolute; top:-1px; left:-1px;
  width:15px; height:15px;
  background:
    linear-gradient(var(--acc),var(--acc)) 0 50% / 100% 1.5px no-repeat,
    linear-gradient(var(--acc),var(--acc)) 50% 0 / 1.5px 100% no-repeat;
  opacity:.85;
  pointer-events:none;
}

/* ===== EYEBROW — 레드펜 사선 틱 + 라벨(손글씨 톤) ===== */
.d4 .eyebrow{
  font-family:var(--fhead);
  color:var(--mut);
  text-transform:uppercase;
  letter-spacing:1px;
}
.d4 .eyebrow::before{
  background:var(--acc);
  width:14px; height:3px;
  border-radius:2px;
  transform:skewX(-22deg);              /* 손으로 그은 사선 틱 */
  box-shadow:3px 0 0 -1px var(--acc);   /* 두 번 톡톡 친 느낌 */
}
.d4 .title{ font-family:var(--fhead); color:var(--tx); }

/* ===== TOOLS / TBTN — 와이어프레임 placeholder 박스(연필 점선) ===== */
.d4 .tbtn{
  background:var(--card);
  color:var(--tx);
  border:var(--bw) dashed var(--bd);
  border-radius:var(--r);
  box-shadow:var(--sh);
  transition:var(--ease);
}
.d4 .tbtn svg{ color:var(--acc); }
.d4 .tbtn:hover{
  border-color:var(--bd2);
  transform:translate(-1px,-1px);
  box-shadow:var(--sh-up);
}
.d4 .tbtn:focus-visible{
  outline:none;
  border-color:var(--acc);
  border-style:solid;
  box-shadow:var(--sh), var(--ring);
}
.d4 .tbtn:active{
  transform:translate(1px,1px);
  box-shadow:var(--sh-down);
}
.d4 .tbtn:disabled{
  cursor:not-allowed;
  opacity:.5;
  border-style:dashed;
  border-color:var(--bd);
  box-shadow:none;
  transform:none;
}
.d4 .tbtn:disabled svg{ color:var(--mut); }

/* pri = 레드펜으로 채운 주(主) 액션 */
.d4 .tbtn.pri{
  background:var(--acc);
  color:var(--on);
  border:var(--bw) solid var(--bd2);
  border-style:solid;
  font-weight:650;
  box-shadow:var(--sh);
}
.d4 .tbtn.pri svg{ color:var(--on); }
.d4 .tbtn.pri:hover{
  background:#bd281d;
  border-color:var(--bd2);
  transform:translate(-1px,-1px);
  box-shadow:var(--sh-up);
}
.d4 .tbtn.pri:focus-visible{
  outline:none;
  border-color:var(--bd2);
  border-style:solid;
  box-shadow:var(--sh), var(--ring);
}
.d4 .tbtn.pri:active{ transform:translate(1px,1px); box-shadow:var(--sh-down); }
.d4 .tbtn.pri:disabled{
  background:var(--acc);
  border-color:var(--bd2);
  border-style:solid;
  opacity:.5;
  box-shadow:none;
  transform:none;
}

/* ===== FIELD — 손으로 그은 밑줄형 와이어프레임 입력 ===== */
.d4 .field{
  background:var(--card);
  color:var(--tx);
  border:var(--bw) solid var(--bd);
  border-bottom:var(--bw) dashed var(--bd2);
  border-radius:var(--r) var(--r) 3px 3px;
  box-shadow:var(--inset);
  transition:var(--ease);
}
.d4 .field::placeholder{ color:var(--mut); font-style:italic; opacity:1; }
.d4 .field:hover{ border-color:var(--bd2); }
.d4 .field:focus,
.d4 .field:focus-visible{
  outline:none;
  border-color:var(--acc);
  border-bottom-style:solid;
  box-shadow:var(--inset), var(--ring);
}
.d4 .field:disabled{
  cursor:not-allowed;
  opacity:.55;
  background:var(--card2);
  border-color:var(--bd);
  box-shadow:none;
}
.d4 textarea.field{ resize:vertical; min-height:64px; line-height:1.5; }

/* ===== PAIR / BTN — 손으로 박스 친 액션, pri는 레드펜 채움 ===== */
.d4 .btn{
  background:var(--card);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r);
  box-shadow:var(--sh);
  transition:var(--ease);
}
.d4 .btn svg{ color:var(--acc); }
.d4 .btn:hover{
  border-color:var(--bd2);
  transform:translate(-1px,-1px);
  box-shadow:var(--sh-up);
}
.d4 .btn:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:var(--sh), var(--ring);
}
.d4 .btn:active{ transform:translate(1px,1px); box-shadow:var(--sh-down); }
.d4 .btn:disabled{
  cursor:not-allowed;
  opacity:.5;
  border-color:var(--bd);
  box-shadow:none;
  transform:none;
}
.d4 .btn:disabled svg{ color:var(--mut); }

.d4 .btn.pri{
  background:var(--acc);
  color:var(--on);
  border-color:var(--bd2);
  font-weight:650;
}
.d4 .btn.pri svg{ color:var(--on); }
.d4 .btn.pri:hover{
  background:#bd281d;
  border-color:var(--bd2);
  transform:translate(-1px,-1px);
  box-shadow:var(--sh-up);
}
.d4 .btn.pri:focus-visible{
  outline:none;
  border-color:var(--bd2);
  box-shadow:var(--sh), var(--ring);
}
.d4 .btn.pri:active{ transform:translate(1px,1px); box-shadow:var(--sh-down); }
.d4 .btn.pri:disabled{
  background:var(--acc);
  border-color:var(--bd2);
  opacity:.5;
  box-shadow:none;
  transform:none;
}

/* ===== CHIP — 레드펜으로 동그라미 친 주석(정적 메타) ===== */
.d4 .chip{
  background:rgba(207,47,35,.07);
  color:var(--acc);
  border:var(--bw) solid var(--acc);
  border-radius:999px;
  font-weight:600;
}

/* ===== ROW — 클립으로 끼운 스케치 카드(연필 점선) ===== */
.d4 .row{
  background:var(--card2);
  border:var(--bw) dashed var(--bd);
  border-radius:var(--r);
}
.d4 .thumb{
  /* 빈 placeholder 대각선 X(차콜 헤어라인) */
  background:
    linear-gradient(45deg,  transparent calc(50% - .75px), var(--bd) calc(50% - .75px), var(--bd) calc(50% + .75px), transparent calc(50% + .75px)),
    linear-gradient(-45deg, transparent calc(50% - .75px), var(--bd) calc(50% - .75px), var(--bd) calc(50% + .75px), transparent calc(50% + .75px)),
    var(--card);
  border:var(--bw) solid var(--bd2);
  border-radius:calc(var(--r) - 3px);
}
.d4 .row .body b{ color:var(--tx); }
.d4 .meta{ color:var(--mut); }
.d4 .icobtn{
  background:var(--card);
  color:var(--mut);
  border:var(--bw) solid var(--bd);
  border-radius:calc(var(--r) - 2px);
  box-shadow:var(--sh-down);
  transition:var(--ease);
}
.d4 .icobtn:hover{
  color:var(--acc);
  border-color:var(--acc);
  transform:translate(-1px,-1px);
  box-shadow:var(--sh);
}
.d4 .icobtn:focus-visible{
  outline:none;
  color:var(--acc);
  border-color:var(--acc);
  box-shadow:var(--sh-down), var(--ring);
}
.d4 .icobtn:active{ transform:translate(1px,1px); box-shadow:none; }
.d4 .icobtn:disabled{
  cursor:not-allowed;
  opacity:.45;
  color:var(--mut);
  border-color:var(--bd);
  box-shadow:none;
  transform:none;
}

/* ===== TOAST — 레드펜 클립 메모지 ===== */
.d4 .toast{
  background:var(--card);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-left:3px solid var(--acc);
  border-radius:var(--r);
  box-shadow:var(--shadow);
}
.d4 .toast::before{ content:"\270E"; color:var(--acc); font-weight:700; }
.d4 .tk{
  font-family:var(--fhead);
  color:var(--mut);
  letter-spacing:.12em;
}

/* ===== 모션 접근성 — 흔들림/이동 줄이기 선호 존중 ===== */
@media (prefers-reduced-motion: reduce){
  .d4 .tbtn,
  .d4 .btn,
  .d4 .field,
  .d4 .icobtn,
  .d4 .tbtn.pri,
  .d4 .btn.pri{ transition:none; }
  .d4 .tbtn:hover, .d4 .tbtn:active,
  .d4 .btn:hover, .d4 .btn:active,
  .d4 .icobtn:hover, .d4 .icobtn:active,
  .d4 .tbtn.pri:hover, .d4 .tbtn.pri:active,
  .d4 .btn.pri:hover, .d4 .btn.pri:active{ transform:none; }
}

/* d5 미드나잇 네온 마커 */
/* ============================================================
   SCOPE .d5 — 미드나잇 네온 마커 (Midnight Neon Marker) / 재작성판
   니어블랙 + 정제된 네온 라임 + 절제된 글로우.
   x7 DNA(2px 오프셋 그림자 · 스케치 보더 · 마커 코너 틱 · 네온)를
   포트폴리오급으로 다듬은 모던 다크 사이드패널.

   통일 체계(랜덤 금지):
   - radius  : --r 10px 단일 / 작은 요소 --rs(=--r-4) / 미세 --rx(=--r-6)
   - border  : --bw 1.5px 단일
   - offset  : "두 번 그은" 그림자 — rest 2px / hover 3px / active 1px
   - lift    : hover translate(-1px,-1px) / active translate(1px,1px)
   - accent  : 면 채움은 primary·chip만, 그 외엔 선/획/글로우로만 라임
   - motion  : transform·box-shadow .12s / color·border .15s, 동일 ease
   - 한글 가독성 우선 → 본문 트래킹 0, --fhead·라벨에만 트래킹·모노 허용
   ============================================================ */

.d5{
  /* ---- 조작 변수 ---- */
  --appbg:#0a0c0a;
  --card:#121613;
  --card2:#0d100e;
  --tx:#eef3ec;            /* 본문 대비 ~14:1 (vs #121613) — AA 충족 */
  --mut:#9fb0a0;           /* 보조 상향: 대비 ~7.2:1 (vs #121613) — AA 충족 */
  --acc:#bdff4a;           /* 정제된 네온 라임 */
  --on:#0a1400;            /* 라임 채움 위 텍스트 — 대비 ~13:1 */
  --bd:#283129;            /* 헤어라인(은은) */
  --bd2:#46543f;           /* 마커 잉크 보더 */
  --r:10px;
  --bw:1.5px;
  --fhead:"Segoe UI Semibold","Apple SD Gothic Neo",system-ui,sans-serif;
  --shadow:2px 2px 0 0 rgba(0,0,0,.55);
  --blur:0px;

  /* ---- 파생 토큰(체계 통일) ---- */
  --rs:calc(var(--r) - 4px);                 /* 작은 요소 라디우스 */
  --rx:calc(var(--r) - 6px);                 /* 미세 요소(썸네일·아이콘버튼) */
  --ink:rgba(0,0,0,.55);                     /* 두 번 그은 검정 오프셋 */
  --tx-hi:#ffffff;                           /* hover 시 본문 강조(토큰화) */
  --glow:0 0 0 1px rgba(189,255,74,.30), 0 0 14px -2px rgba(189,255,74,.40);
  --glow-soft:0 0 10px -3px rgba(189,255,74,.50);
  --glow-strong:0 0 16px -2px rgba(189,255,74,.70);
  --acc-soft:rgba(189,255,74,.12);
  --acc-line:rgba(189,255,74,.55);
  --acc-faint:rgba(189,255,74,.05);
  --err:#ff5d73;                             /* 에러 강조(대비 ~6:1) */
  --err-line:rgba(255,93,115,.55);
  /* 오프셋 그림자 3단(rest/hover/active) — 전 컴포넌트 공유 */
  --off:2px 2px 0 0 var(--ink);
  --off-hi:3px 3px 0 0 var(--ink);
  --off-lo:1px 1px 0 0 var(--ink);
  --ease:cubic-bezier(.2,.7,.3,1);
  --t-press:transform .12s var(--ease), box-shadow .12s var(--ease);
  --t-tone:border-color .15s ease, color .15s ease, background .15s ease;

  position:relative;
  background:
    /* 우상단에서 번지는 라임 글로우(아주 은은) */
    radial-gradient(120% 80% at 100% -8%, rgba(189,255,74,.07), transparent 52%),
    /* 미세 도트 그리드 — 제도판 질감, 거의 안 보일 만큼 옅게 */
    radial-gradient(rgba(255,255,255,.022) 1px, transparent 1px) 0 0/22px 22px,
    var(--appbg);
  color:var(--tx);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  letter-spacing:0;                          /* 한글 본문 트래킹 제거 — 가독성 우선 */
  border-color:var(--bd2);
}
.d5 *{box-sizing:border-box;}

/* 키보드 접근성: 공통 focus-visible 링(라임 글로우) — 마우스엔 안 뜸 */
.d5 :focus-visible{
  outline:none;
  box-shadow:var(--glow);
}

/* ============================================================
   HEAD — 워드마크 밑줄을 라임 마커로 쓱 + 버전은 네온 라벨
   ============================================================ */
.d5 .head{ border-bottom-color:var(--bd); }
.d5 .head h1{
  font-family:var(--fhead);
  color:var(--tx);
  display:inline-block;
  padding-bottom:3px;
  letter-spacing:.2px;                       /* 워드마크만 미세 트래킹 허용 */
  /* 두께 다른 두 획이 겹친 '두 번 그은' 마커 밑줄 */
  background:
    linear-gradient(var(--acc),var(--acc)) left 100% / 100% 3px no-repeat,
    linear-gradient(var(--acc-line),var(--acc-line)) left calc(100% - 4px) / 64% 2px no-repeat;
  text-shadow:0 0 1px rgba(189,255,74,.10);
}
.d5 .ver{
  font-family:ui-monospace,"SFMono-Regular",Consolas,monospace;
  font-size:10.5px;
  letter-spacing:.04em;
  color:var(--acc);
  background:var(--acc-soft);
  border:var(--bw) solid var(--acc-line);
  border-radius:999px;
  padding:2px 9px;
  box-shadow:1px 1px 0 0 var(--ink);
}

/* ============================================================
   CARD — 마커로 친 박스: 두 번 그은 오프셋 + 라임 코너 틱(독창①)
   ============================================================ */
.d5 .card{
  position:relative;
  background:
    linear-gradient(180deg, rgba(189,255,74,.035), transparent 38%),
    var(--card);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r);
  /* 두 번 그은 듯 — 검정 오프셋 + 라임 헤어라인이 살짝 겹침 */
  box-shadow:
    var(--off),
    0 0 0 var(--bw) var(--acc-faint);
}
/* 좌상단 라임 L자 마커 코너 틱 */
.d5 .card::before{
  content:"";
  position:absolute; inset:-1px auto auto -1px;
  width:16px; height:16px;
  border-top:2px solid var(--acc);
  border-left:2px solid var(--acc);
  border-radius:var(--r) 0 0 0;
  filter:drop-shadow(0 0 4px rgba(189,255,74,.45));
  pointer-events:none;
}
/* 우하단 미세 대칭 틱 — 절제(독창① 보강) */
.d5 .card::after{
  content:"";
  position:absolute; inset:auto -1px -1px auto;
  width:12px; height:12px;
  border-bottom:2px solid var(--acc-line);
  border-right:2px solid var(--acc-line);
  border-radius:0 0 var(--r) 0;
  pointer-events:none;
}

/* eyebrow — 사선 마커 획 틱(독창②: 미세 글로우) */
.d5 .eyebrow{
  color:var(--mut);
  text-transform:uppercase;
  letter-spacing:.16em;                      /* 라벨 한정 트래킹 허용 */
  font-weight:600;
}
.d5 .eyebrow::before{
  content:"";
  display:inline-block;
  width:14px; height:3px;
  background:var(--acc);
  border-radius:2px;
  transform:skewX(-22deg);
  box-shadow:
    4px 0 0 -1px var(--acc-line),               /* 두 번 톡 친 사선 */
    0 0 8px -1px rgba(189,255,74,.55);          /* 은은한 네온 번짐 */
}
.d5 .title{
  font-family:var(--fhead);
  color:var(--tx);
  font-weight:650;
  letter-spacing:.1px;
}

/* ============================================================
   TOOLS / TBTN — 스케치 보더 + 두 번 그은 오프셋. pri만 라임 채움
   ============================================================ */
.d5 .tbtn{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--rs);
  font-weight:550;
  box-shadow:var(--off);
  transition:var(--t-press), var(--t-tone);
}
.d5 .tbtn svg{ color:var(--acc); transition:color .15s ease; }
.d5 .tbtn:hover{
  border-color:var(--acc-line);
  color:var(--tx-hi);
  transform:translate(-1px,-1px);
  box-shadow:var(--off-hi), var(--glow-soft);
}
.d5 .tbtn:focus-visible{ border-color:var(--acc); box-shadow:var(--off), var(--glow); }
.d5 .tbtn:active{ transform:translate(1px,1px); box-shadow:var(--off-lo); }
.d5 .tbtn:disabled{
  opacity:.42; cursor:not-allowed;
  transform:none; box-shadow:var(--off);
  border-color:var(--bd); color:var(--mut);
}
.d5 .tbtn:disabled svg{ color:var(--mut); }
.d5 .tbtn:disabled:hover{ border-color:var(--bd); color:var(--mut); }
/* primary: 라임 마커 채움 */
.d5 .tbtn.pri{
  background:var(--acc);
  color:var(--on);
  border-color:var(--acc);
  font-weight:700;
  box-shadow:var(--off), 0 0 12px -3px rgba(189,255,74,.55);
}
.d5 .tbtn.pri svg{ color:var(--on); }
.d5 .tbtn.pri:hover{
  color:var(--on);
  filter:brightness(1.06);
  transform:translate(-1px,-1px);
  box-shadow:var(--off-hi), var(--glow-strong);
}
.d5 .tbtn.pri:focus-visible{ box-shadow:var(--off), var(--glow); }
.d5 .tbtn.pri:active{ filter:brightness(.97); transform:translate(1px,1px);
  box-shadow:var(--off-lo); }
.d5 .tbtn.pri:disabled{
  background:var(--card2); color:var(--mut); border-color:var(--bd);
  filter:none; box-shadow:var(--off);
}
.d5 .tbtn.pri:disabled svg{ color:var(--mut); }

/* primary outline 토글(ancestor [data-prifill=outline]) 대비: 라임 선/획 유지 */
.d5 .tbtn.pri[style],
.d5 .tbtn.pri{ /* no-op guard: 채움형 기본, outline은 상위 토글이 처리 */ }

/* ============================================================
   FIELD — 라임 밑줄 강조 입력칸(와이어프레임 톤)
   ============================================================ */
.d5 .field{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--rs);
  box-shadow:inset 2px 2px 0 0 rgba(0,0,0,.30);
  transition:var(--t-tone), box-shadow .15s ease;
}
.d5 .field::placeholder{ color:var(--mut); }
.d5 .field:hover{
  border-color:var(--acc-line);              /* 실질 hover 피드백 신설 */
  background:#0f1310;
}
.d5 .field:focus,
.d5 .field:focus-visible{
  outline:none;
  border-color:var(--acc);
  background:#0f1310;
  box-shadow:inset 2px 2px 0 0 rgba(0,0,0,.30), var(--glow);
}
.d5 .field:disabled{
  opacity:.5; cursor:not-allowed;
  border-color:var(--bd);
}
.d5 .field:disabled:hover{ border-color:var(--bd); background:var(--card2); }
.d5 .field:read-only{ color:var(--mut); }

/* ============================================================
   PAIR / BTN — 박스 친 액션. pri는 라임 채움
   ============================================================ */
.d5 .btn{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--rs);
  font-weight:600;
  box-shadow:var(--off);
  transition:var(--t-press), var(--t-tone);
}
.d5 .btn svg{ color:var(--acc); transition:color .15s ease; }
.d5 .btn:hover{
  border-color:var(--acc-line);
  color:var(--tx-hi);
  transform:translate(-1px,-1px);
  box-shadow:var(--off-hi), var(--glow-soft);
}
.d5 .btn:focus-visible{ border-color:var(--acc); box-shadow:var(--off), var(--glow); }
.d5 .btn:active{ transform:translate(1px,1px); box-shadow:var(--off-lo); }
.d5 .btn:disabled{
  opacity:.42; cursor:not-allowed;
  transform:none; box-shadow:var(--off);
  border-color:var(--bd); color:var(--mut);
}
.d5 .btn:disabled svg{ color:var(--mut); }
.d5 .btn:disabled:hover{ border-color:var(--bd); color:var(--mut); }
.d5 .btn.pri{
  background:var(--acc);
  color:var(--on);
  border-color:var(--acc);
  font-weight:700;
  box-shadow:var(--off), 0 0 12px -3px rgba(189,255,74,.55);
}
.d5 .btn.pri svg{ color:var(--on); }
.d5 .btn.pri:hover{
  color:var(--on);
  filter:brightness(1.06);
  transform:translate(-1px,-1px);
  box-shadow:var(--off-hi), var(--glow-strong);
}
.d5 .btn.pri:focus-visible{ box-shadow:var(--off), var(--glow); }
.d5 .btn.pri:active{ filter:brightness(.97); transform:translate(1px,1px);
  box-shadow:var(--off-lo); }
.d5 .btn.pri:disabled{
  background:var(--card2); color:var(--mut); border-color:var(--bd);
  filter:none; box-shadow:var(--off);
}
.d5 .btn.pri:disabled svg{ color:var(--mut); }

/* ============================================================
   CHIP — 라임 라인으로 두른 주석 태그
   ============================================================ */
.d5 .chip{
  background:var(--acc-soft);
  color:var(--acc);
  border:var(--bw) solid var(--acc-line);
  border-radius:999px;
  font-weight:600;
  letter-spacing:.04em;
}

/* ============================================================
   ROW — 끼워 넣은 스케치 카드. 썸네일은 라임 대각선 placeholder
   ============================================================ */
.d5 .row{
  background:var(--card2);
  border:var(--bw) solid var(--bd);
  border-radius:var(--rs);
  box-shadow:var(--off);
  transition:var(--t-press), border-color .15s ease;
}
.d5 .row:hover{
  border-color:var(--bd2);
  transform:translate(-1px,-1px);
  box-shadow:var(--off-hi);
}
/* 포커스가 내부(.field/.icobtn)에 들어가면 row도 라임 외곽 강조 */
.d5 .row:focus-within{
  border-color:var(--acc-line);
}
.d5 .thumb{
  background:
    linear-gradient(45deg, transparent calc(50% - 1px), var(--acc-line) calc(50% - 1px), var(--acc-line) calc(50% + 1px), transparent calc(50% + 1px)),
    linear-gradient(-45deg, transparent calc(50% - 1px), var(--bd2) calc(50% - 1px), var(--bd2) calc(50% + 1px), transparent calc(50% + 1px)),
    var(--card);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--rx);
}
.d5 .row .body b{ color:var(--tx); font-weight:650; }
.d5 .meta{ color:var(--mut); }

/* PIN — 핀 메모 번호 인덱스(실 마크업에 존재, 라임 마커 인덱스) */
.d5 .pin{
  display:grid; place-items:center;
  min-width:22px; height:22px;
  padding:0 4px;
  font-family:ui-monospace,"SFMono-Regular",Consolas,monospace;
  font-size:11px; font-weight:700;
  color:var(--acc);
  background:var(--acc-soft);
  border:var(--bw) solid var(--acc-line);
  border-radius:var(--rx);
  box-shadow:1px 1px 0 0 var(--ink);
}

.d5 .icobtn{
  background:transparent;
  color:var(--mut);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--rx);
  transition:var(--t-press), border-color .15s ease, color .15s ease;
}
.d5 .icobtn:hover{
  color:var(--acc);
  border-color:var(--acc-line);
  box-shadow:var(--glow-soft);
}
.d5 .icobtn:focus-visible{ color:var(--acc); border-color:var(--acc); box-shadow:var(--glow); }
.d5 .icobtn:active{ transform:translate(1px,1px); box-shadow:var(--off-lo); }
.d5 .icobtn:disabled{ opacity:.42; cursor:not-allowed; color:var(--mut);
  border-color:var(--bd); box-shadow:none; transform:none; }
.d5 .icobtn:disabled:hover{ color:var(--mut); border-color:var(--bd); box-shadow:none; }

/* ============================================================
   TOAST — 네온 좌측 바 + 깜빡 인디케이터 / err 변형 포함
   ============================================================ */
.d5 .toast{
  background:var(--card);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-left:3px solid var(--acc);
  border-radius:var(--rs);
  box-shadow:var(--shadow), 0 0 14px -4px rgba(189,255,74,.4);
}
.d5 .tk{
  font-family:ui-monospace,"SFMono-Regular",Consolas,monospace;
  font-size:9px;
  letter-spacing:.12em;
  font-weight:700;                           /* 9px 미세 텍스트 가독성 보강 */
  color:var(--acc);
}
.d5 .tk::before{
  content:"";
  display:inline-block;
  width:6px; height:6px;
  margin-right:6px;
  border-radius:50%;
  background:var(--acc);
  box-shadow:0 0 8px 0 rgba(189,255,74,.85);
  vertical-align:middle;
}
/* 에러 토스트 — 좌측 바·인디케이터·라벨을 레드로(실 마크업 .toast.err) */
.d5 .toast.err{
  border-left-color:var(--err);
  box-shadow:var(--shadow), 0 0 14px -4px rgba(255,93,115,.4);
}
.d5 .toast.err .tk{ color:var(--err); }
.d5 .toast.err .tk::before{
  background:var(--err);
  box-shadow:0 0 8px 0 rgba(255,93,115,.85);
}

/* ============================================================
   접근성: 모션 민감 사용자 — 트랜스폼/트랜지션 제거
   ============================================================ */
@media (prefers-reduced-motion: reduce){
  .d5 .tbtn, .d5 .btn, .d5 .row, .d5 .icobtn, .d5 .field,
  .d5 .tbtn svg, .d5 .btn svg{
    transition:none !important;
  }
  .d5 .tbtn:hover, .d5 .btn:hover, .d5 .row:hover,
  .d5 .tbtn:active, .d5 .btn:active, .d5 .icobtn:active,
  .d5 .tbtn.pri:hover, .d5 .btn.pri:hover{
    transform:none !important;
  }
}

/* d6 모노크롬 스케치 + 한 점 (.d6) */
/* ============================================================
   SCOPE=.d6 — 모노크롬 스케치 + 한 점 (연필/잉크 무채 + 레드 단 한 색) · REFINED
   미니멀-럭스: 극도로 깔끔하고 절제된 손그림. x7 DNA를 무채로 다듬어 고급스럽게.
   * 베이스 .theme 스켈레톤(고정 마크업)의 변수/타깃 위에 .d6만 덮어씀.
   ============================================================ */
.d6{
  /* 무채 종이 — 미세 연필결(가로 라인) + 따뜻한 그래파이트 그라데 */
  --appbg:
    repeating-linear-gradient(0deg, rgba(255,255,255,.010) 0 1px, transparent 1px 28px),
    radial-gradient(125% 95% at 20% -10%, #1a1a1c 0%, #141415 50%, #0d0d0e 100%);
  --card:#161618;          /* 연필 스케치 종이 — 무채 그레이 */
  --card2:#101012;         /* 한 단계 들어간 무채 */
  --tx:#ededed;            /* 잉크 본문 — card 위 15.4:1 */
  --mut:#a3a3a6;           /* 연필 보조 그레이 — card 위 7.2:1 (AA↑, 한글 메타 가독) */
  --acc:#d83434;           /* 단 하나의 점 — 마커 레드 */
  --acc-h:#c52d2d;         /* hover: 한 톤 진한 잉크 (흰 텍스트 5.5:1) */
  --acc-a:#aa2020;         /* active: 가장 눌린 잉크 (흰 텍스트 7.2:1) */
  --acc-soft:#f76d6d;      /* 작은 글씨용 밝은 레드 — card2 위 6.7:1 (AA↑) */
  --on:#ffffff;            /* 레드 채움 위 순백 텍스트 */
  --bd:#2b2b2e;            /* 가는 연필 헤어라인 */
  --bd2:#3d3d41;           /* 진한 연필 보더 */
  --bd-dis:#242427;        /* disabled 헤어라인 */
  --r:7px;                 /* 라디우스 체계: 7 / 5 / 999 — 세 단계만 (랜덤 금지) */
  --r-s:5px;
  --bw:1.4px;              /* 스케치 닙 두께 */
  --fhead:"Segoe Print","Bradley Hand",ui-rounded,system-ui,sans-serif; /* 라벨/헤딩 한정 손글씨(한글 폴백) */
  --shadow:none;
  --blur:0px;
  /* 오프셋 그림자 깊이 사다리 (1/2/3px 세 단계로 고정 — x7 DNA, 다듬어 럭스하게) */
  --ofs-1:1px 1px 0 0 rgba(0,0,0,.40);
  --ofs-2:2px 2px 0 0 rgba(0,0,0,.42);
  --ofs-3:3px 3px 0 0 rgba(0,0,0,.50);
  --ofs-r2:2px 2px 0 0 rgba(120,18,18,.55); /* 레드 채움용 오프셋 */
  --ofs-r3:3px 3px 0 0 rgba(80,10,10,.60);
  --ring:0 0 0 2px rgba(216,52,52,.40);     /* 포커스 링 — 한 점 레드 */
  --ring-on:0 0 0 2px rgba(255,255,255,.55);/* 레드 채움 위 포커스 링 — 흰 */

  position:relative;
  background:var(--appbg);
  color:var(--tx);
  box-shadow:var(--ofs-3);          /* 컨테이너: 두 번 그은 오프셋 (무채 절제) */
  letter-spacing:.1px;
}

/* 독창 디테일 ①: 우상단 '연필로 깎인 모서리' — 종이 한 귀가 접힌 무채 폴드.
   .ver 배지와 겹치지 않도록 작고 얕게, 컨테이너 모서리에 정확히 정렬 */
.d6::after{
  content:"";
  position:absolute; top:0; right:0;
  width:14px; height:14px;
  background:linear-gradient(225deg, var(--bd2) 0 1.4px, var(--card) 1.4px 7px, transparent 7px);
  border-radius:0 var(--r) 0 0;
  opacity:.9;
  pointer-events:none;
}

/* ---- 헤더: 워드마크 밑줄을 레드 마커로 한 번 그음 (끝이 살짝 못 닿는 절제) ---- */
.d6 .head{ border-bottom:var(--bw) solid var(--bd); }
.d6 .head h1{
  color:var(--tx);
  display:inline-block;
  padding-bottom:4px;
  /* 수평 마커 밑줄 — 90deg로 또렷하게(91deg 안티앨리어싱 제거), 끝 6px는 비워 손맛 */
  background:
    linear-gradient(90deg, var(--acc) 0 calc(100% - 6px), transparent calc(100% - 6px)) left bottom / 100% 2.4px no-repeat;
}
.d6 .ver{
  font-family:var(--fhead);
  color:var(--mut);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r-s);          /* 통일 라디우스(랜덤 per-corner 제거) */
  padding:1px 7px;
}

/* ---- eyebrow: ::before 틱을 레드 마커로 톡 — 라벨은 무채 손글씨 ---- */
.d6 .eyebrow{
  font-family:var(--fhead);
  color:var(--mut);
  text-transform:uppercase;
  letter-spacing:.5px;
}
.d6 .eyebrow::before{          /* 마커 틱(장식 — 13×2.4px, 큰요소 3:1↑) */
  background:var(--acc);
  width:13px; height:2.4px;
  border-radius:2px;
}
.d6 .title{ color:var(--tx); font-family:var(--fhead); }

/* ============ 공통 인터랙션 토큰 (동일 체계 — 랜덤 금지) ============ */
.d6 .tbtn,.d6 .btn,.d6 .icobtn{
  transition:transform .09s ease, box-shadow .09s ease, border-color .14s ease, background-color .14s ease, color .14s ease;
}

/* ---- 도구 버튼(.tbtn): 연필로 친 와이어프레임 (두 번 그은 무채 오프셋) ---- */
.d6 .tbtn{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r);
  box-shadow:var(--ofs-2);
}
.d6 .tbtn svg{ color:var(--mut); transition:color .14s ease; }
.d6 .tbtn:hover{
  transform:translate(-1px,-1px);
  box-shadow:var(--ofs-3);
  border-color:var(--tx);
}
.d6 .tbtn:hover svg{ color:var(--acc); }      /* 호버 시에만 한 점이 켜짐 */
.d6 .tbtn:focus-visible{
  outline:none;
  border-color:var(--acc);
  box-shadow:var(--ofs-2), var(--ring);
}
.d6 .tbtn:active{ transform:translate(1px,1px); box-shadow:0 0 0 0 rgba(0,0,0,.4); }
.d6 .tbtn:disabled{ opacity:.42; cursor:not-allowed; transform:none; box-shadow:var(--ofs-1); border-color:var(--bd-dis); }
.d6 .tbtn:disabled svg{ color:var(--mut); }
/* pri = 채워진 레드 (마커로 칠한 단 하나의 강조) */
.d6 .tbtn.pri{
  background:var(--acc);
  color:var(--on);
  border-color:var(--acc);
  box-shadow:var(--ofs-r2);
}
.d6 .tbtn.pri svg{ color:var(--on); }
/* deepen-on-press: 호버 시 잉크가 더 진해짐 — 흰 텍스트 5.5:1 유지 */
.d6 .tbtn.pri:hover{ background:var(--acc-h); border-color:var(--acc-h); box-shadow:var(--ofs-r3); }
.d6 .tbtn.pri:hover svg{ color:var(--on); }
.d6 .tbtn.pri:focus-visible{ border-color:var(--on); box-shadow:var(--ofs-r2), var(--ring-on); }
.d6 .tbtn.pri:active{ background:var(--acc-a); border-color:var(--acc-a); transform:translate(1px,1px); box-shadow:0 0 0 0 rgba(0,0,0,.4); }
.d6 .tbtn.pri:disabled{ background:var(--bd2); color:var(--mut); border-color:var(--bd2); opacity:.5; box-shadow:var(--ofs-1); }

/* ---- 인풋·textarea(.field): 연필 밑줄 와이어프레임 ---- */
.d6 .field{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd);
  border-bottom-color:var(--bd2);    /* 밑줄만 한 톤 진하게 — 연필 베이스라인 */
  border-radius:var(--r) var(--r) var(--r-s) var(--r-s); /* 위 7 / 아래 5 (통일 토큰) */
  transition:border-color .14s ease, box-shadow .14s ease;
}
.d6 .field::placeholder{ color:var(--mut); }
.d6 .field:hover{ border-color:var(--bd2); }
.d6 .field:focus,.d6 .field:focus-visible{
  outline:none;
  border-color:var(--bd2);
  border-bottom-color:var(--acc);    /* 포커스 시 한 점이 밑줄로 켜짐 */
  box-shadow:var(--ring);            /* 깔끔한 단일 레드 링(중첩 글로우 제거) */
}
.d6 .field:disabled{ opacity:.45; cursor:not-allowed; }

/* ---- pair 액션 버튼(.btn) — .tbtn과 동일 체계 ---- */
.d6 .btn{
  background:var(--card2);
  color:var(--tx);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r);
  box-shadow:var(--ofs-2);
}
.d6 .btn svg{ color:var(--mut); transition:color .14s ease; }
.d6 .btn:hover{ transform:translate(-1px,-1px); box-shadow:var(--ofs-3); border-color:var(--tx); }
.d6 .btn:hover svg{ color:var(--acc); }
.d6 .btn:focus-visible{ outline:none; border-color:var(--acc); box-shadow:var(--ofs-2), var(--ring); }
.d6 .btn:active{ transform:translate(1px,1px); box-shadow:0 0 0 0 rgba(0,0,0,.4); }
.d6 .btn:disabled{ opacity:.42; cursor:not-allowed; transform:none; box-shadow:var(--ofs-1); border-color:var(--bd-dis); }
.d6 .btn.pri{
  background:var(--acc);
  color:var(--on);
  border-color:var(--acc);
  box-shadow:var(--ofs-r2);
}
.d6 .btn.pri svg{ color:var(--on); }
.d6 .btn.pri:hover{ background:var(--acc-h); border-color:var(--acc-h); box-shadow:var(--ofs-r3); }
.d6 .btn.pri:hover svg{ color:var(--on); }
.d6 .btn.pri:focus-visible{ border-color:var(--on); box-shadow:var(--ofs-r2), var(--ring-on); }
.d6 .btn.pri:active{ background:var(--acc-a); border-color:var(--acc-a); transform:translate(1px,1px); box-shadow:0 0 0 0 rgba(0,0,0,.4); }
.d6 .btn.pri:disabled{ background:var(--bd2); color:var(--mut); border-color:var(--bd2); opacity:.5; box-shadow:var(--ofs-1); }

/* ---- chip: 연필로 동그라미 친 주석 — 한 점(밝은) 레드 텍스트 (작은 글씨 AA↑) ---- */
.d6 .chip{
  background:transparent;
  color:var(--acc-soft);
  border:var(--bw) solid var(--bd2);
  border-radius:999px;
  padding:2px 9px;
  font-weight:600;
  letter-spacing:.2px;
}
.d6 .chip::before{ content:"\25CF"; color:var(--acc-soft); font-size:7px; vertical-align:1.5px; margin-right:5px; }

/* ---- row: 연필로 끼운 스케치 카드 ---- */
.d6 .row{
  background:var(--card2);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r);
}
/* row 안의 .field(핀 메모 인라인 입력)는 보더 충돌 없이 베이스라인 유지 */
.d6 .row .field{ background:transparent; }
/* 독창 디테일 ②: 빈 썸네일 = 연필로 대각선 그은 와이어프레임 placeholder */
.d6 .thumb{
  background:
    linear-gradient(45deg, transparent calc(50% - .8px), var(--bd2) calc(50% - .8px), var(--bd2) calc(50% + .8px), transparent calc(50% + .8px)),
    var(--card);
  border:var(--bw) solid var(--bd2);
  border-radius:var(--r-s);
}
.d6 .row .body b{ color:var(--tx); }
.d6 .meta{ color:var(--mut); }

/* ---- icobtn: 무채 연필 아이콘 버튼 — 호버 시 한 점 점화 ---- */
.d6 .icobtn{
  background:transparent;
  color:var(--mut);
  border:var(--bw) solid var(--bd);
  border-radius:var(--r-s);
}
.d6 .icobtn:hover{ color:var(--acc); border-color:var(--acc); transform:translate(-1px,-1px); box-shadow:var(--ofs-2); }
.d6 .icobtn:focus-visible{ outline:none; color:var(--acc); border-color:var(--acc); box-shadow:var(--ring); }
.d6 .icobtn:active{ transform:translate(1px,1px); box-shadow:none; }
.d6 .icobtn:disabled{ opacity:.42; cursor:not-allowed; color:var(--mut); border-color:var(--bd-dis); transform:none; box-shadow:none; }

  color:var(--on);
  border-radius:var(--r-s);

.d6 .empty{ color:var(--mut); }

.d6 .empty p{ color:var(--mut); }

/* ---- toast: 잉크 메모 톤 — 왼쪽 레드 마커 라인 ---- */
.d6 .toast{

.d6 .toast.err .tk{ color:var(--acc-soft); }
