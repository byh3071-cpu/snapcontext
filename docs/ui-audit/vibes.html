<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SnapContext — 무드(톤) 8종 비교</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0a0a0c;color:#e6e3d8;font-family:system-ui,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;padding:0 0 80px}
  .top{position:sticky;top:0;z-index:9;background:#060608;border-bottom:1px solid #23231d;padding:14px 22px}
  .top h1{margin:0 0 4px;font-size:16px}
  .top p{margin:0;font-size:12px;color:#8b8b80;line-height:1.5}
  .gal{display:flex;flex-wrap:wrap;gap:22px;padding:24px 22px;align-items:flex-start}
  .board{width:340px}
  .board > .cap{display:flex;align-items:baseline;gap:8px;margin:0 0 8px}
  .board > .cap b{font-size:14px}
  .board > .cap span{font-size:11px;color:#8b8b80}
  svg{display:block}

  /* ===== 구조(테마 무관, 전부 CSS 변수) ===== */
  .theme{--appbg:#0b0b0c;--card:#0e0e10;--card2:#08080a;--tx:#e6e3d8;--mut:#7d7a6e;--acc:#4fd6e0;--on:#04222a;--bd:#23231d;--bd2:#3a3a30;--r:6px;--bw:1px;--fhead:inherit;--shadow:none;--blur:0px}
  .theme{background:var(--appbg);border:1px solid var(--bd2);border-radius:var(--r);padding:14px;display:grid;gap:12px;color:var(--tx);font-size:14px;line-height:1.45}
  .theme .head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:var(--bw) solid var(--bd);padding-bottom:10px}
  .theme .head h1{margin:0;font-size:17px;font-weight:650;font-family:var(--fhead)}
  .theme .ver{font-size:11px;color:var(--mut)}
  .theme .card{position:relative;background:var(--card);border:var(--bw) solid var(--bd);border-radius:var(--r);padding:12px;display:grid;gap:10px;box-shadow:var(--shadow);backdrop-filter:blur(var(--blur))}
  .theme .eyebrow{font-size:10px;letter-spacing:.14em;color:var(--mut);display:flex;align-items:center;gap:6px}
  .theme .eyebrow::before{content:'';width:10px;height:1px;background:var(--acc)}
  .theme .title{margin:0;font-size:14px;font-weight:650;font-family:var(--fhead)}
  .theme .tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .theme .tbtn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 8px;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:var(--card2);color:var(--tx);font:inherit;font-size:13px;font-weight:550;cursor:pointer}
  .theme .tbtn svg{color:var(--acc)} .theme .tbtn:hover{border-color:var(--acc)}
  .theme .tbtn.pri{background:var(--acc);color:var(--on);border-color:var(--acc);font-weight:650} .theme .tbtn.pri svg{color:var(--on)}
  .theme .field{width:100%;background:var(--card2);border:var(--bw) solid var(--bd2);border-radius:var(--r);color:var(--tx);font:inherit;font-size:13px;padding:8px 10px}
  .theme .field::placeholder{color:var(--mut)}
  .theme .pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .theme .btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:var(--card2);color:var(--tx);font:inherit;font-size:13px;cursor:pointer}
  .theme .btn svg{color:var(--acc)} .theme .btn.pri{background:var(--acc);color:var(--on);border-color:var(--acc);font-weight:650} .theme .btn.pri svg{color:var(--on)}
  .theme .chip{font-size:10px;color:var(--acc);border:var(--bw) solid var(--bd2);border-radius:var(--r);padding:2px 7px;justify-self:start}
  .theme .row{display:grid;grid-template-columns:46px 1fr auto;gap:10px;align-items:center;padding:8px;border:var(--bw) solid var(--bd);border-radius:var(--r);background:var(--card2)}
  .theme .thumb{width:46px;aspect-ratio:4/3;border:var(--bw) solid var(--bd2);background:rgba(128,128,128,.12);border-radius:calc(var(--r) - 1px)}
  .theme .row .body{min-width:0;display:grid;gap:2px}
  .theme .row .body b{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .theme .meta{font-size:10.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .theme .icobtn{width:28px;height:28px;display:grid;place-items:center;border:var(--bw) solid var(--bd2);border-radius:var(--r);background:transparent;color:var(--mut);cursor:pointer}
  .theme .toast{display:flex;align-items:center;gap:8px;padding:9px 11px;border:var(--bw) solid var(--bd2);border-left:2px solid var(--acc);border-radius:var(--r);background:var(--card);font-size:13px}
  .theme .tk{font-size:9px;letter-spacing:.1em;color:var(--mut)}

  /* ===== 무드별 오버라이드 ===== */
  /* v1 터미널/Hermes */
  .v1{--appbg:#0b0b0c;--card:#0e0e10;--card2:#08080a;--tx:#e6e3d8;--mut:#7d7a6e;--acc:#4fd6e0;--on:#04222a;--bd:#23231d;--bd2:#3a3a30;--r:2px}
  .v1 .eyebrow,.v1 .meta,.v1 .ver,.v1 .tk,.v1 .chip{font-family:ui-monospace,Menlo,Consolas,monospace}
  .v1 .card::before{content:'';position:absolute;top:-1px;left:-1px;width:8px;height:8px;border:1px solid var(--acc);border-right:0;border-bottom:0;opacity:.6}

  /* v2 미니멀 다크 (Linear) */
  .v2{--appbg:#0d1117;--card:#151b24;--card2:#0f141c;--tx:#e8eaed;--mut:#8b95a5;--acc:#6ea8fe;--on:#08101f;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);--r:9px}

  /* v3 글래스모피즘 */
  .v3{--appbg:linear-gradient(135deg,#3a1c71,#d76d77 60%,#2bd0c2);--card:rgba(255,255,255,.08);--card2:rgba(255,255,255,.05);--tx:#fff;--mut:rgba(255,255,255,.7);--acc:#ffffff;--on:#222;--bd:rgba(255,255,255,.18);--bd2:rgba(255,255,255,.28);--r:16px;--blur:14px;--shadow:0 8px 32px rgba(0,0,0,.25)}
  .v3 .tbtn.pri,.v3 .btn.pri{background:rgba(255,255,255,.9)}

  /* v4 네온 사이버펑크 */
  .v4{--appbg:#070710;--card:#0c0c18;--card2:#0a0a14;--tx:#e8e8ff;--mut:#7a7aa0;--acc:#ff2ed1;--on:#0a0014;--bd:rgba(255,46,209,.2);--bd2:rgba(255,46,209,.35);--r:6px}
  .v4 .tbtn.pri,.v4 .btn.pri{box-shadow:0 0 16px rgba(255,46,209,.55)}
  .v4 .card{box-shadow:inset 0 0 0 1px rgba(45,212,255,.08)}
  .v4 .eyebrow::before{background:#2dd4ff} .v4 .chip{color:#2dd4ff;border-color:rgba(45,212,255,.4)}

  /* v5 에디토리얼 (세리프) */
  .v5{--appbg:#15130e;--card:#1b1810;--card2:#12100a;--tx:#ece6da;--mut:#9a9182;--acc:#d9b16a;--on:#1a1408;--bd:#322c20;--bd2:#473f2e;--r:4px;--fhead:Georgia,'Times New Roman',serif}
  .v5 .head h1{letter-spacing:.01em} .v5 .title{font-style:italic}

  /* v6 브루탈리스트 */
  .v6{--appbg:#0f0f0f;--card:#141414;--card2:#0d0d0d;--tx:#f5f5f5;--mut:#a0a0a0;--acc:#e8ff00;--on:#000;--bd:#ffffff;--bd2:#ffffff;--r:0;--bw:2px}
  .v6 .eyebrow,.v6 .meta,.v6 .ver,.v6 .tk{font-family:ui-monospace,Menlo,Consolas,monospace;text-transform:uppercase}
  .v6 .eyebrow::before{display:none}

  /* v7 소프트 파스텔 다크 */
  .v7{--appbg:#1a1b24;--card:#212230;--card2:#191a24;--tx:#e9e8f2;--mut:#9b99b4;--acc:#b8a6f0;--on:#1a1238;--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.1);--r:14px;--shadow:0 6px 20px rgba(0,0,0,.28)}

  /* v8 클린 라이트 */
  .v8{--appbg:#eceae4;--card:#ffffff;--card2:#f5f4f0;--tx:#1d1f22;--mut:#6b7280;--acc:#2f6df6;--on:#ffffff;--bd:#e6e5df;--bd2:#d6d5cd;--r:10px;--shadow:0 1px 3px rgba(0,0,0,.06)}
</style>
</head>
<body>
  <div class="top">
    <h1>SnapContext — 무드(톤) 8종</h1>
    <p>전혀 다른 8가지 분위기. 같은 사이드패널에 테마만 바꿔 비교. 끌리는 번호(들) 알려주면 그 방향으로 좁혀서 다듬음. "v3 좋은데 라이트 말고 다크로" 식으로 섞어도 됨.</p>
  </div>
  <div class="gal" id="gal"></div>

  <template id="slice">
    <header class="head"><h1>SnapContext</h1><span class="ver">v0.1.3</span></header>
    <div class="toast"><span class="tk">INFO</span>캡처를 불러왔습니다.</div>
    <div class="card">
      <div class="eyebrow">캡처 모드</div>
      <div class="tools">
        <button class="tbtn pri"><span data-ic="monitor" data-sz="16"></span>화면 캡처</button>
        <button class="tbtn"><span data-ic="file" data-sz="16"></span>문서 캡처</button>
        <button class="tbtn"><span data-ic="scan" data-sz="16"></span>요소 캡처</button>
        <button class="tbtn"><span data-ic="maximize" data-sz="16"></span>전체 캡처</button>
      </div>
    </div>
    <div class="card">
      <div class="eyebrow">AI 디버그 팩</div>
      <h2 class="title">컨텍스트 팩</h2>
      <textarea class="field" rows="2" placeholder="증상이나 AI에게 요청할 내용을 적어주세요"></textarea>
      <div class="pair">
        <button class="btn pri"><span data-ic="sparkles" data-sz="15"></span>프롬프트 복사</button>
        <button class="btn"><span data-ic="braces" data-sz="15"></span>JSON 복사</button>
      </div>
      <span class="chip">최근 팩 · 2</span>
    </div>
    <div class="card">
      <div class="eyebrow">캡처 기록</div>
      <div class="row"><div class="thumb"></div><div class="body"><b>예시 페이지 제목 — 길면 말줄임</b><span class="meta">06.04 14:32 · 영역 · 핀 3</span></div><button class="icobtn"><span data-ic="x" data-sz="14"></span></button></div>
    </div>
  </template>

<script>
  var IC={monitor:'M3 4h18v12H3zM8 20h8M12 16v4',file:'M6 2h8l4 4v16H6zM14 2v4h4',scan:'M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4M9 12h6',maximize:'M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5',sparkles:'M12 3l1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z',braces:'M7 4a2 2 0 0 0-2 2v3l-2 3 2 3v3a2 2 0 0 0 2 2M17 4a2 2 0 0 1 2 2v3l2 3-2 3v3a2 2 0 0 1-2 2',x:'M18 6 6 18M6 6l12 12'};
  var VIBES=[
    ['v1','터미널 / Hermes','니어블랙·시안·모노·각짐·코너틱'],
    ['v2','미니멀 다크','Linear/Vercel풍·블루·차분'],
    ['v3','글래스모피즘','반투명 유리·블러·컬러풀'],
    ['v4','네온 사이버펑크','블랙·마젠타 글로우'],
    ['v5','에디토리얼','세리프 제목·골드·잡지풍'],
    ['v6','브루탈리스트','두꺼운 흰선·옐로·각짐'],
    ['v7','소프트 파스텔','라벤더·둥근·부드러움'],
    ['v8','클린 라이트','밝은 배경·블루(라이트모드)']
  ];
  var gal=document.getElementById('gal'), tpl=document.getElementById('slice');
  VIBES.forEach(function(v){
    var board=document.createElement('div');board.className='board';
    board.innerHTML='<div class="cap"><b>'+v[0].toUpperCase()+'. '+v[1]+'</b><span>'+v[2]+'</span></div>';
    var theme=document.createElement('div');theme.className='theme '+v[0];
    theme.appendChild(tpl.content.cloneNode(true));
    board.appendChild(theme);gal.appendChild(board);
  });
  document.querySelectorAll('[data-ic]').forEach(function(el){var n=el.getAttribute('data-ic'),s=el.getAttribute('data-sz')||'18';el.innerHTML='<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="'+(IC[n]||IC.file)+'"/></svg>';});
</script>
</body>
</html>
