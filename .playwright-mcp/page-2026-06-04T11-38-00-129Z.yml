        - heading "Overview" [level=2] [ref=e206]:
          - generic [ref=e207]: Overview
        - generic [ref=e208]:
          - generic [ref=e209]:
            - paragraph [ref=e210]: The best screen recorder and screen capture & screenshot tool to record screen.
            - paragraph [ref=e211]: "Want to share your screen for purposes such as reporting technical issues, creating product demos, or crafting how-to tutorials? Here are 🔟 reasons to choose Awesome Screen Recorder & Screenshot. 1️⃣ Provide stable service for more than 10 years 2️⃣ Loved by more than 4 million users across different platforms 👍 3️⃣ Local Screen Recorder & Cloud Screen Recorder 2 in 1 4️⃣ Screenshot/Screen Capture & Screen Recording 2 in 1 5️⃣ Record in WebM or MP4 6️⃣ Powerful features specially designed for work and educational scenarios 7️⃣ No ads and respect your privacy 8️⃣ Easy to use 9️⃣ Instantly share your screenshots and screen recordings 🔟 Most importantly, your voice matters! 🗣 & continuous improvements Here are some features for recording screens and capturing screenshots: 🎦🎦🎦 Screen Recorder 🎦🎦🎦 🎥 Record ▸ Record your Desktop (Entire Screen or Window), Current Tab or Camera only ▸ Include your voice in recording with the Microphone option on ▸ Include your face in your video by embedding your webcam ▸ Choose video dimensions from 720p, 1080p or 4K 💾 Save ▸ Save recordings to your local disk ▸ Save recordings to your online account ▸ Download uploaded videos in the MP4 or WebM format 🚀 Share Recordings ▸ Instantly get a shareable link of a video after finishing recording ▸ Easily share a recording video to Jira, Slack, Trello, Asana, GitHub 🖍 Annotate ＆ Edit ▸ Annotate the screen while recording ▸ Annotate and edit the video after recording Prefer to screenshot web pages as images? No problem, you can set the Capture tab as the primary tab. 📸📸📸 Capture Screenshot 📸📸📸 📷 Screen Capture ▸ Capture a screenshot of the page you visit, full page, selected area or visible part ▸ Capture a screenshot of your entire screen or a specific application window ▸ Capture visible part, entire screen or app window after delay 🖍 Annotate Screenshot ▸ Resize or crop a screenshot to the size you need ▸ Annotate your screenshot with rectangles, circles, arrows, lines, etc. ▸ Add text to your screenshot with or without background color, change text font and font size ▸ Blur sensitive information on your screenshot ▸ Highlight important part on your screenshot ▸ Select a local image or paste a copied image from your clipboard to annotate 📥 Save & Share Screenshot ▸ Save screenshot as image in PNG or JPG format, or download screenshot as PDF ▸ One click to save screenshot to your Awesome Screenshot account and get a shareable link ▸ Send a screenshot to a destination in Jira, Slack, Trello, Asana, GitHub ▸ Copy a screenshot directly when capturing selected area for quick pasting 📧 Contact us📧 If you have any questions, suggestions, or feature requests, feel free to contact us by clicking Feedback (recommended) in our browser extension’s popup menu or by this page https://www.awesomescreenshot.com/contact_us. Thank you."
