      - generic [ref=e190]:
        - heading "Overview" [level=2] [ref=e192]:
          - generic [ref=e193]: Overview
        - generic [ref=e194]:
          - generic [ref=e195]:
            - paragraph [ref=e196]: Take FULL webpage screenshots. Capture, edit and save them to PDF/JPEG/GIF/PNG, upload, print, send to OneNote, clipboard or email.
            - paragraph [ref=e197]: "FireShot helps you: • Save receipts, tickets, and order confirmations • Capture long articles, ChatGPT, research, and documentation • Share design reviews, bug reports, and product ideas • Keep permanent records of web pages that may change or disappear 🔒 Screenshot is done instantly and stored locally. It never leaves your computer, so it's 100% safe for storing a sensitive information. FireShot can work offline. 🏆 Awarded as \"The Best Free Google Chrome Extension (Full Page Screenshot Tool)\" by PCMAG.COM 🛑 No spyware and unnecessary permissions - you're just in a couple of clicks away from an ideal screenshot. Top 7️⃣ reasons to install FireShot: 1️⃣ Save screenshot to disk as PDF (with links), PNG, and JPEG 2️⃣ Capture entire page, visible part of the web page or just a selection 3️⃣ Automatically capture all tabs to PDF or image 🔥 (https://getfireshot.com/demos/capture-all-tabs.php) 4️⃣ Provide a list of URLs for an automatic batch capturing process 🔥 (https://getfireshot.com/demos/capture-website-urls.php) 5️⃣ Attach screenshot to Gmail 6️⃣ Copy screenshot to clipboard 7️⃣ Print ### An upgrade is available. Activate it directly from the menu and: ✓ PDF with direct links and text, can be saved as a single page or split to pages ✓ Capture specific elements, such as scrolling areas on web pages (https://getfireshot.com/selection.php) ✓ Capture all tabs in one click and save to single PDF (https://getfireshot.com/demos/capture-all-tabs.php) ✓ Edit: crop, resize, add text and arrow annotations, blur areas and apply other effects ✓ Send to OneNote (Pro version) ✓ Save captures to disk as PNG, GIF, JPEG, BMP ✓ Upload to Twitter, ImageShack, Flickr, EasyCaptures, custom FTP or HTTP servers ✓ Copy to clipboard ✓ Print ✓ E-Mail ✓ Export captures to external editor ✓ Add page information to screenshot (URL, title, time, domain, etc)"
