        - generic [ref=e177]:
          - generic [ref=e178]:
            - paragraph [ref=e179]: Simple and convenient screenshot tool. Select an area, edit your screenshot and upload it to the server.
            - paragraph [ref=e180]: "Lightshot is the fastest way to take a customizable screenshot. Simple interface, nothing useless and light weight. Features: * take screenshot and share it in few clicks * select any part of the page * edit screenshot in place * save on a disk or upload to the cloud * search for similar screenshots * copy screenshot in clipboard More information here: http://app.prntscr.com/ Privacy policy: https://app.prntscr.com/en/privacy.html?privacy Clarification of the extension permissions: * Read your browsing history - Chrome adds this line when we request tabs manipulation permission. Lightshot opens screenshot in a new tab, that is why we need it. * Display notifications - Lightshot displays notification every time you upload screenshot * Modify data you copy and paste - Lightshot allows you to copy screenshot into your Clipboard * Manage your downloads - Lightshot allows you to save screenshot as a new file (works using download functions) Contact e-mail: support@skillbrains.com Send your requests and bug reports here. We appreciate your contribution!"
